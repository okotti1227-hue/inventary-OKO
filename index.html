<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Инвентарь ОКО Cloud</title>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --oko-green: #5C6041;
            --oko-beige: #D9D1B5;
            --oko-brown: #3B352A;
            --oko-white: #F4EEDC;
            --oko-red: #cc0000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Times New Roman", Times, serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--oko-white); color: var(--oko-brown); min-height: 100vh; }

        /* LOGIN */
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
        .login-card { background: white; padding: 30px; border-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; border: 2px solid var(--oko-beige); }

        /* APP */
        #main-app { display: none; padding-bottom: 80px; }
        .container { max-width: 700px; margin: 0 auto; padding: 10px; }
        
        header { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 15px 0; border-bottom: 1px solid var(--oko-beige); margin-bottom: 15px; }
        .header-title { font-size: 1.2rem; font-weight: bold; color: var(--oko-green); text-transform: uppercase; white-space: nowrap; }
        .logout-btn { justify-self: end; background: none; border: 1px solid var(--oko-brown); padding: 5px 10px; cursor: pointer; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; border-radius: 4px; }

        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        .stat-card { background: var(--oko-beige); padding: 10px 2px; border-radius: 4px; text-align: center; border: 2px solid transparent; cursor: pointer; transition: 0.2s; }
        .stat-card.active-filter { border-color: var(--oko-green); background: #c9c0a3; }
        .stat-number { font-size: 1.2rem; font-weight: bold; color: var(--oko-green); }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; font-weight: bold; }
        
        .loc-stats .stat-card { background: #E5E0CD; }

        .sub-stats-container { background: #fff; padding: 10px; border-radius: 4px; border: 1px solid var(--oko-beige); margin-bottom: 15px; font-size: 0.85rem; }
        .sub-stat-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px dotted #ccc; }
        .sub-stat-name { font-weight: bold; color: var(--oko-brown); }

        .search-box { width: 100%; padding: 12px; border: 1px solid var(--oko-beige); margin-bottom: 15px; outline: none; font-size: 1rem; background: white; }

        /* ИЕРАРХИЯ (ПАПКИ) */
        .location-folder { margin-top: 15px; }
        .location-header { 
            background: var(--oko-brown); color: white; padding: 12px; 
            border-radius: 4px; font-weight: bold; cursor: pointer; 
            display: flex; justify-content: space-between; text-transform: uppercase; 
        }
        .group-folder { margin: 5px 0 5px 15px; }
        .group-header { 
            background: var(--oko-green); color: white; padding: 10px; 
            border-radius: 4px; font-size: 0.9rem; cursor: pointer; 
            display: flex; justify-content: space-between; font-weight: bold;
        }
        
        .folder-icon::after { content: ' ▼'; font-size: 0.7rem; }
        .collapsed .folder-icon::after { content: ' ◀'; }

        .folder-content { display: block; }
        .hidden { display: none !important; }

        /* КАРТОЧКИ */
        .item-card { background: white; border-radius: 4px; overflow: hidden; margin: 10px 0 10px 15px; border: 1px solid var(--oko-beige); cursor: pointer; position: relative; }
        .item-image-container { width: 100%; height: 250px; background: #222; display: flex; align-items: center; justify-content: center; }
        .item-image { width: 100%; height: 100%; object-fit: contain; }
        .item-content { padding: 12px; }
        .status-badge { position: absolute; top: 10px; right: 10px; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; z-index: 5; background: #ffebee; color: #c62828; border: 1px solid #c62828; }

        /* MODALS */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; overflow-y: auto; }
        .modal.active { display: block; }
        #editModal { z-index: 3000 !important; } /* Всегда сверху */

        .modal-content { background: var(--oko-white); width: 100%; min-height: 100vh; padding: 20px; position: relative; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 2.5rem; border: none; background: none; cursor: pointer; }

        .btn-action { padding: 12px; border: 1px solid var(--oko-brown); border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 8px; text-transform: uppercase; background: white; font-size: 0.9rem; }
        .btn-green { background: var(--oko-green); color: white; border: none; }
        .btn-danger { color: var(--oko-red); border-color: var(--oko-red); }

        .fab { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: var(--oko-green); color: white; border-radius: 50%; border: none; font-size: 2rem; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 1000; }
        .fab-menu { position: fixed; bottom: 90px; right: 20px; display: none; flex-direction: column; gap: 12px; z-index: 1000; }
        .fab-menu.active { display: flex; }
        .fab-item { background: white; padding: 12px 20px; border-radius: 4px; font-weight: bold; border: 1px solid var(--oko-beige); font-size: 0.9rem; text-align: center; color: var(--oko-brown); }

        .loader-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
    </style>
</head>
<body>

    <div id="loader" class="loader-overlay"><h2>ОБРАБОТКА...</h2></div>

    <div id="login-screen">
        <div class="login-card">
            <h1 style="color: var(--oko-green); margin-bottom: 20px;">Инвентарь ОКО</h1>
            <input type="text" id="user-login" class="search-box" placeholder="Логин">
            <input type="password" id="user-pass" class="search-box" placeholder="Пароль">
            <button class="btn-action btn-green" onclick="checkAccess()">ВОЙТИ</button>
        </div>
    </div>

    <div id="main-app">
        <div class="container">
            <header>
                <div style="font-size: 0.7rem;">ONLINE</div>
                <div class="header-title">Инвентарь ОКО</div>
                <button class="btn-action" style="width:auto; padding:5px 10px;" onclick="logout()">Выход</button>
            </header>

            <div class="stats-bar">
                <div class="stat-card" id="btn-all" onclick="setStatFilter('all')"><div class="stat-number" id="totalItems">0</div><div class="stat-label">ВСЕГО</div></div>
                <div class="stat-card" id="btn-ok" onclick="setStatFilter('ok')"><div class="stat-number" id="okItems">0</div><div class="stat-label">ОК</div></div>
                <div class="stat-card" id="btn-repair" onclick="setStatFilter('repair')"><div class="stat-number" id="repairItems">0</div><div class="stat-label">РЕМОНТ</div></div>
            </div>

            <div class="stats-bar loc-stats">
                <div class="stat-card" onclick="filterByLoc('Зал')"><div class="stat-number" id="locHall">0</div><div class="stat-label">ЗАЛ</div></div>
                <div class="stat-card" onclick="filterByLoc('Кухня')"><div class="stat-number" id="locKitchen">0</div><div class="stat-label">КУХНЯ</div></div>
                <div class="stat-card" onclick="filterByLoc('Бар')"><div class="stat-number" id="locBar">0</div><div class="stat-label">БАР</div></div>
                <div class="stat-card" onclick="filterByLoc('Склад')"><div class="stat-number" id="locWh">0</div><div class="stat-label">СКЛАД</div></div>
            </div>

            <div id="subStatsList" class="sub-stats-container">
                <div id="subStatsContent"></div>
            </div>

            <input type="text" class="search-box" id="searchInput" placeholder="Поиск..." onkeyup="renderItems()">
            <div id="itemsContainer"></div>
        </div>

        <button class="fab" onclick="document.getElementById('fabMenu').classList.toggle('active')">+</button>
        <div class="fab-menu" id="fabMenu">
            <button class="fab-item" onclick="openAddModal()">Добавить объект</button>
            <button class="fab-item" onclick="openScanner()">Сканер QR</button>
            <button class="fab-item" onclick="printAllQR()">Печать всех QR</button>
            <button class="fab-item" onclick="exportToExcel()">Excel отчет</button>
        </div>
    </div>

    <!-- МОДАЛКИ (БЕЗ ИЗМЕНЕНИЙ ЛОГИКИ) -->
    <div id="addModal" class="modal"><div class="modal-content">
        <button class="close-btn" onclick="closeModal('addModal')">&times;</button>
        <h2>НОВЫЙ ОБЪЕКТ</h2><br>
        <input type="text" id="addId" class="search-box" readonly>
        <input type="text" id="itemName" class="search-box" placeholder="Название">
        <select id="itemLocation" class="search-box">
            <option value="Зал">Зал</option><option value="Кухня">Кухня</option><option value="Бар">Бар</option><option value="Склад">Склад</option><option value="Офис">Офис</option>
        </select>
        <select id="addSubCatSelect" class="search-box" onchange="checkNewSub('add')"></select>
        <input type="text" id="addCustomSub" class="search-box" style="display:none;" placeholder="Новая подгруппа">
        <input type="file" id="itemPhoto" class="search-box" accept="image/*">
        <button class="btn-action btn-green" onclick="saveNewItem()">СОХРАНИТЬ</button>
    </div></div>

    <div id="editModal" class="modal"><div class="modal-content">
        <button class="close-btn" onclick="closeModal('editModal')">&times;</button>
        <h2>РЕДАКТИРОВАТЬ</h2><br>
        <input type="hidden" id="editItemTargetId">
        <input type="text" id="editItemName" class="search-box">
        <select id="editItemLocation" class="search-box">
            <option value="Зал">Зал</option><option value="Кухня">Кухня</option><option value="Бар">Бар</option><option value="Склад">Склад</option>
        </select>
        <select id="editSubCatSelect" class="search-box" onchange="checkNewSub('edit')"></select>
        <input type="text" id="editCustomSub" class="search-box" style="display:none;">
        <input type="file" id="editItemPhoto" class="search-box" accept="image/*">
        <button class="btn-action btn-green" onclick="saveEditChanges()">ПРИМЕНИТЬ</button>
    </div></div>

    <div id="itemModal" class="modal"><div class="modal-content" id="itemModalContent"></div></div>
    <div id="scannerModal" class="modal"><div class="modal-content"><button class="close-btn" onclick="closeScanner()">&times;</button><div id="reader"></div></div></div>

    <script>
        const USERS = { "Sam": "oko2024", "Radmir": "oko 2025" };
        const firebaseConfig = {
            apiKey: "AIzaSyAk1A8PBDpSQjjiFoKyprSvzK4jO9Us_34",
            authDomain: "inventory-oko.firebaseapp.com",
            databaseURL: "https://inventory-oko-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "inventory-oko",
            storageBucket: "inventory-oko.firebasestorage.app"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let items = [], subCategories = [], globalStatusFilter = 'all', html5QrCode = null;

        function checkAccess() {
            const l = document.getElementById('user-login').value.trim();
            const p = document.getElementById('user-pass').value.trim();
            if (USERS[l] === p) { localStorage.setItem('oko_auth', 'true'); localStorage.setItem('oko_user', l); showApp(); } 
            else alert("Ошибка входа!");
        }
        function logout() { localStorage.removeItem('oko_auth'); location.reload(); }
        if (localStorage.getItem('oko_auth') === 'true') showApp();

        function showApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            db.ref('inventory').on('value', snap => {
                items = snap.val() ? Object.values(snap.val()) : [];
                renderItems(); updateStats();
            });
            db.ref('settings/subCategories').on('value', snap => {
                subCategories = snap.val() ? Object.values(snap.val()) : [];
                updateDropdowns();
            });
        }

        // ГЛАВНАЯ ФУНКЦИЯ: РЕНДЕР ПАПОК
        function renderItems() {
            const container = document.getElementById('itemsContainer'), search = document.getElementById('searchInput').value.toLowerCase();
            container.innerHTML = '';
            
            const filtered = items.filter(i => {
                const ms = i.name.toLowerCase().includes(search) || i.id.toLowerCase().includes(search) || i.location.toLowerCase().includes(search) || (i.sub && i.sub.toLowerCase().includes(search));
                const mf = globalStatusFilter === 'all' ? true : i.status === globalStatusFilter;
                return ms && mf;
            });

            const tree = {};
            filtered.forEach(item => {
                const loc = item.location || "Прочее";
                const sub = item.sub || "Без группы";
                if (!tree[loc]) tree[loc] = {};
                if (!tree[loc][sub]) tree[loc][sub] = [];
                tree[loc][sub].push(item);
            });

            Object.keys(tree).sort().forEach(locName => {
                const locBox = document.createElement('div'); locBox.className = 'location-folder collapsed';
                const locHead = document.createElement('div'); locHead.className = 'location-header';
                locHead.innerHTML = `<span>${locName}</span><span class="folder-icon"></span>`;
                
                const locContent = document.createElement('div'); locContent.className = 'folder-content hidden';
                
                locHead.onclick = () => {
                    locBox.classList.toggle('collapsed');
                    locContent.classList.toggle('hidden');
                };

                if (search.length > 0) { locBox.classList.remove('collapsed'); locContent.classList.remove('hidden'); }

                Object.keys(tree[locName]).sort().forEach(subName => {
                    const groupBox = document.createElement('div'); groupBox.className = 'group-folder collapsed';
                    const groupHead = document.createElement('div'); groupHead.className = 'group-header';
                    groupHead.innerHTML = `<span>${subName} (${tree[locName][subName].length})</span><span class="folder-icon"></span>`;
                    
                    const groupContent = document.createElement('div'); groupContent.className = 'folder-content hidden';
                    
                    groupHead.onclick = (e) => { e.stopPropagation(); groupBox.classList.toggle('collapsed'); groupContent.classList.toggle('hidden'); };

                    if (search.length > 0) { groupBox.classList.remove('collapsed'); groupContent.classList.remove('hidden'); }

                    tree[locName][subName].forEach(item => {
                        const card = document.createElement('div'); card.className = 'item-card';
                        card.onclick = (e) => { e.stopPropagation(); showItemDetail(item.id); };
                        const status = item.status === 'repair' ? '<div class="status-badge">РЕМОНТ</div>' : '';
                        card.innerHTML = `${status}<div class="item-image-container"><img src="${item.photo}" class="item-image"></div><div class="item-content"><strong>${item.name}</strong><br><span style="font-size:0.8rem; color:#666;">ID: ${item.id}</span><div id="qr-${item.id}"></div></div>`;
                        groupContent.appendChild(card);
                        setTimeout(() => new QRCode(document.getElementById(`qr-${item.id}`), { text: window.location.origin + window.location.pathname + "?id=" + item.id, width: 70, height: 70 }), 100);
                    });

                    groupBox.appendChild(groupHead); groupBox.appendChild(groupContent);
                    locContent.appendChild(groupBox);
                });

                locBox.appendChild(locHead); locBox.appendChild(locContent);
                container.appendChild(locBox);
            });
        }

        function showItemDetail(id) {
            const item = items.find(i => i.id === id); if (!item) return;
            const statusBtn = item.status === 'repair' ? `<button class="btn-action btn-green" onclick="upStat('${item.id}', 'ok')">✅ В СТРОЙ</button>` : `<button class="btn-action btn-danger" onclick="upStat('${item.id}', 'repair')">🔧 В РЕМОНТ</button>`;
            document.getElementById('itemModalContent').innerHTML = `
                <button class="close-btn" onclick="closeModal('itemModal')">&times;</button>
                <img src="${item.photo}" style="width:100%; border-radius:4px; margin-bottom:10px;">
                <h2>${item.name}</h2>
                <p>ID: ${item.id} | Группа: ${item.sub}</p>
                <p><strong>Проверка: ${item.lastCheck} (${item.lastCheckBy || '---'})</strong></p><br>
                <button class="btn-action btn-green" onclick="markCheck('${item.id}')">ИНВЕНТАРИЗАЦИЯ ПРОЙДЕНА</button>
                <button class="btn-action" onclick="openEditModal('${item.id}')">📦 ПЕРЕМЕСТИТЬ / ИЗМЕНИТЬ</button>
                ${statusBtn}
                <button class="btn-action" onclick="printQR('${item.id}')">ПЕЧАТЬ QR</button>
                <button class="btn-action btn-danger" onclick="deleteItem('${item.id}')">УДАЛИТЬ</button>`;
            document.getElementById('itemModal').classList.add('active');
        }

        // ПЕЧАТЬ (МАЛЕНЬКИЕ QR)
        function printQR(id) {
            const it = items.find(i => i.id === id); const win = window.open('', '_blank');
            win.document.write(`<html><body style="text-align:center; padding:10px;"><div id="q"></div><div style="font-size:10px; font-family:sans-serif;">${it.name}<br>${it.id}</div><script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script><script>new QRCode(document.getElementById('q'), {text: "${window.location.origin + window.location.pathname}?id=${id}", width: 80, height: 80}); window.onload=()=>{setTimeout(()=>{window.print();window.close();},500);};<\/script></body></html>`);
            win.document.close();
        }

        function printAllQR() {
            const pWin = window.open('', '_blank');
            pWin.document.write(`<html><body style="display:flex; flex-wrap:wrap; font-family:sans-serif;"><script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script>`);
            items.forEach(it => {
                pWin.document.write(`<div style="width:90px; text-align:center; margin:5px; border:0.5px solid #ccc; padding:5px;"><div id="q-${it.id}"></div><div style="font-size:8px;">${it.name}</div><script>new QRCode(document.getElementById('q-${it.id}'), {text: "${window.location.origin + window.location.pathname}?id=${it.id}", width: 75, height: 75});<\/script></div>`);
            });
            pWin.document.write(`<script>window.onload=()=>{setTimeout(()=>{window.print();window.close();},1500);};<\/script></body></html>`);
            pWin.document.close();
        }

        // ФУНКЦИИ FIREBASE (БЕЗ ИЗМЕНЕНИЙ)
        async function saveNewItem() {
            const id = document.getElementById('addId').value, name = document.getElementById('itemName').value.trim();
            const loc = document.getElementById('itemLocation').value;
            let sub = document.getElementById('addSubCatSelect').value, custom = document.getElementById('addCustomSub').value.trim(), file = document.getElementById('itemPhoto').files[0];
            const user = localStorage.getItem('oko_user') || "---";
            if (!name) return alert("Имя!");
            if (sub === 'NEW') { sub = custom; db.ref('settings/subCategories').push(sub); }
            document.getElementById('loader').style.display = 'flex';
            let photo = 'https://via.placeholder.com/400x200';
            if (file) photo = await new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(file); });
            await db.ref('inventory/' + id).set({ id, name, location: loc, sub: sub || "Прочее", photo, status: 'ok', lastCheck: 'Нет', addedDate: new Date().toLocaleDateString('ru-RU'), createdBy: user });
            document.getElementById('loader').style.display = 'none'; closeModal('addModal');
        }

        async function saveEditChanges() {
            const id = document.getElementById('editItemTargetId').value, name = document.getElementById('editItemName').value.trim(), loc = document.getElementById('editItemLocation').value;
            let sub = document.getElementById('editSubCatSelect').value, custom = document.getElementById('editCustomSub').value.trim(), file = document.getElementById('editItemPhoto').files[0];
            if (sub === 'NEW') { sub = custom; db.ref('settings/subCategories').push(sub); }
            document.getElementById('loader').style.display = 'flex';
            let up = { name, location: loc, sub: sub || "Прочее" };
            if (file) up.photo = await new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(file); });
            await db.ref('inventory/' + id).update(up);
            document.getElementById('loader').style.display = 'none'; closeModal('editModal');
        }

        function markCheck(id) { const user = localStorage.getItem('oko_user') || "---"; db.ref('inventory/' + id).update({ lastCheck: new Date().toLocaleDateString('ru-RU'), lastCheckBy: user }); closeModal('itemModal'); }
        function upStat(id, s) { db.ref('inventory/' + id).update({ status: s }); closeModal('itemModal'); }
        function openAddModal() { document.getElementById('addId').value = 'OKO-' + Math.floor(1000 + Math.random() * 9000); document.getElementById('addModal').classList.add('active'); }
        function openEditModal(id) { const it = items.find(i => i.id === id); document.getElementById('editItemTargetId').value = id; document.getElementById('editItemName').value = it.name; document.getElementById('editModal').classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function setStatFilter(s) { globalStatusFilter = s; renderItems(); updateStats(); }
        function filterByLoc(l) { document.getElementById('searchInput').value = l; renderItems(); }
        function updateDropdowns() { ['addSubCatSelect', 'editSubCatSelect'].forEach(id => { const sel = document.getElementById(id); sel.innerHTML = '<option value="">-- Группа --</option>'; subCategories.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`); sel.innerHTML += '<option value="NEW">+ НОВАЯ</option>'; }); }
        function checkNewSub(t) { document.getElementById(t === 'add' ? 'addCustomSub' : 'editCustomSub').style.display = (document.getElementById(t === 'add' ? 'addSubCatSelect' : 'editSubCatSelect').value === 'NEW') ? 'block' : 'none'; }
        function updateStats() {
            document.getElementById('totalItems').innerText = items.length;
            document.getElementById('okItems').innerText = items.filter(i => i.status === 'ok').length;
            document.getElementById('repairItems').innerText = items.filter(i => i.status === 'repair').length;
            const subContent = document.getElementById('subStatsContent'); subContent.innerHTML = '';
            [...new Set(items.map(i => i.sub))].forEach(s => { const count = items.filter(i => i.sub === s).length; subContent.innerHTML += `<div class="sub-stat-row"><span>${s || 'Без группы'}</span><span>${count}</span></div>`; });
        }
        function openScanner() { document.getElementById('scannerModal').classList.add('active'); html5QrCode = new Html5Qrcode("reader"); html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, t => { const id = t.split('?id=')[1] || t; showItemDetail(id); closeScanner(); }); }
        function closeScanner() { if (html5QrCode) html5QrCode.stop(); closeModal('scannerModal'); }
        function exportToExcel() { const data = items.map(i => ({ ID: i.id, Имя: i.name, Локация: i.location, Группа: i.sub, Статус: i.status })); const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Inventory"); XLSX.writeFile(wb, "OKO_Cloud.xlsx"); }
    </script>
</body>
