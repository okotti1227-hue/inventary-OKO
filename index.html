<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Инвентарь ОКО Cloud</title>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --oko-green: #5C6041;
            --oko-beige: #D9D1B5;
            --oko-brown: #3B352A;
            --oko-white: #F4EEDC;
            --oko-red: #cc0000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Times New Roman", Times, serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--oko-white); color: var(--oko-brown); min-height: 100vh; }

        /* ЛОГИН */
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
        .login-card { background: white; padding: 30px; border-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; border: 2px solid var(--oko-beige); }

        #main-app { display: none; padding-bottom: 80px; }
        .container { max-width: 700px; margin: 0 auto; padding: 10px; }
        
        /* ШАПКА БЕЗ ЛОГО */
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--oko-beige); margin-bottom: 15px; }
        .header-title { font-size: 1.4rem; font-weight: bold; color: var(--oko-green); text-transform: uppercase; }
        .logout-btn { background: none; border: 1px solid var(--oko-brown); padding: 5px 10px; cursor: pointer; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; border-radius: 4px; color: var(--oko-brown); }

        .sync-status { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; font-weight: bold; padding: 4px 10px; border-radius: 20px; }
        .sync-online { background-color: #d4edda; color: #155724; }
        .sync-offline { background-color: #f8d7da; color: #721c24; }

        /* СТАТИСТИКА */
        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        .stat-card { background: var(--oko-beige); padding: 10px 2px; border-radius: 4px; text-align: center; border: 1px solid rgba(0,0,0,0.05); cursor: pointer; transition: 0.2s; }
        .stat-card:active { opacity: 0.6; }
        .stat-number { font-size: 1.2rem; font-weight: bold; color: var(--oko-green); }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; font-weight: bold; }
        .loc-stats .stat-card { background: #E5E0CD; }

        .search-box { width: 100%; padding: 12px; border: 1px solid var(--oko-beige); margin-bottom: 15px; outline: none; font-size: 1rem; background: white; }

        /* КАРТОЧКИ */
        .item-card { background: white; border-radius: 4px; overflow: hidden; margin-bottom: 12px; border: 1px solid var(--oko-beige); cursor: pointer; position: relative; }
        .item-image-container { width: 100%; height: 250px; background: #222; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .item-image { width: 100%; height: 100%; object-fit: contain; }
        .item-content { padding: 12px; }
        .status-badge { position: absolute; top: 10px; right: 10px; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; z-index: 5; background: #ffebee; color: #c62828; border: 1px solid #c62828; }

        .qr-wrapper { background: white; padding: 5px; display: inline-block; border: 1px solid #ddd; margin-top: 5px; }

        .btn { padding: 12px; border: 1px solid var(--oko-brown); border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 8px; text-transform: uppercase; background: white; font-size: 0.9rem; }
        .btn-primary { background: var(--oko-green); color: white; border: none; }
        .btn-danger { color: var(--oko-red); border-color: var(--oko-red); }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; overflow-y: auto; }
        .modal.active { display: block; }
        .modal-content { background: var(--oko-white); width: 100%; min-height: 100vh; padding: 20px; position: relative; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 2.5rem; border: none; background: none; cursor: pointer; color: var(--oko-brown); z-index: 10; }

        /* КОМПАКТНОЕ ФОТО В ДЕТАЛЯХ */
        .detail-photo-box { background: #222; border-radius: 4px; display: flex; justify-content: center; height: 220px; overflow: hidden; margin-bottom: 15px; }
        .detail-photo { height: 100%; object-fit: contain; }

        /* FAB MENU */
        .fab { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: var(--oko-green); color: white; border-radius: 50%; border: none; font-size: 2rem; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 1000; cursor: pointer; }
        .fab-menu { position: fixed; bottom: 90px; right: 20px; display: none; flex-direction: column; gap: 12px; z-index: 1000; }
        .fab-menu.active { display: flex; }
        .fab-item { background: white; padding: 12px 20px; border-radius: 4px; font-weight: bold; border: 1px solid var(--oko-beige); font-size: 0.9rem; text-transform: uppercase; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); cursor: pointer; color: var(--oko-brown); }

        .loader-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
    </style>
</head>
<body>

    <div id="loader" class="loader-overlay"><h2>ОБРАБОТКА...</h2></div>

    <!-- ЭКРАН ВХОДА -->
    <div id="login-screen">
        <div class="login-card">
            <h1 style="color: var(--oko-green); margin-bottom: 10px; font-size: 1.8rem;">Инвентарь ОКО</h1>
            <p style="font-size: 0.8rem; margin-bottom: 25px; color: #666;">Система контроля имущества</p>
            <input type="text" id="user-login" class="search-box" placeholder="Логин">
            <input type="password" id="user-pass" class="search-box" placeholder="Пароль">
            <button class="btn btn-primary" onclick="checkAccess()">Войти</button>
        </div>
    </div>

    <!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
    <div id="main-app">
        <div class="container">
            <header>
                <div class="header-title">Инвентарь ОКО</div>
                <div id="syncStatus" class="sync-status sync-offline">
                    <span id="syncIcon">⚠️</span> <span id="syncText">Офлайн</span>
                </div>
                <button class="logout-btn" onclick="logout()">Выход</button>
            </header>

            <div class="stats-bar">
                <div class="stat-card" onclick="setStatFilter('all')"><div class="stat-number" id="totalItems">0</div><div class="stat-label">ВСЕГО</div></div>
                <div class="stat-card" onclick="setStatFilter('ok')"><div class="stat-number" id="okItems">0</div><div class="stat-label">ОК</div></div>
                <div class="stat-card" onclick="setStatFilter('repair')"><div class="stat-number" id="repairItems">0</div><div class="stat-label">РЕМОНТ</div></div>
            </div>

            <div class="stats-bar loc-stats">
                <div class="stat-card" onclick="filterByLoc('Зал')"><div class="stat-number" id="locHall">0</div><div class="stat-label">ЗАЛ</div></div>
                <div class="stat-card" onclick="filterByLoc('Кухня')"><div class="stat-number" id="locKitchen">0</div><div class="stat-label">КУХНЯ</div></div>
                <div class="stat-card" onclick="filterByLoc('Бар')"><div class="stat-number" id="locBar">0</div><div class="stat-label">БАР</div></div>
                <div class="stat-card" onclick="filterByLoc('Склад')"><div class="stat-number" id="locWh">0</div><div class="stat-label">СКЛАД</div></div>
            </div>

            <input type="text" class="search-box" id="searchInput" placeholder="Поиск..." onkeyup="renderItems()">
            <div id="itemsContainer"></div>
        </div>

        <button class="fab" onclick="document.getElementById('fabMenu').classList.toggle('active')">+</button>
        <div class="fab-menu" id="fabMenu">
            <button class="fab-item" onclick="openAddModal()">Добавить объект</button>
            <button class="fab-item" onclick="openScanner()">Сканер QR</button>
            <button class="fab-item" onclick="printAllQR()" style="background: #f0fdf4; color: #166534; border-color: #bbf7d0;">🖨️ Печать всех QR</button>
            <button class="fab-item" onclick="exportToExcel()">Выгрузить Excel</button>
        </div>
    </div>

    <!-- Модалки -->
    <div id="addModal" class="modal"><div class="modal-content">
        <button class="close-btn" onclick="closeModal('addModal')">&times;</button>
        <h2 style="color:var(--oko-green)">НОВЫЙ ОБЪЕКТ</h2><br>
        <input type="text" id="addId" class="search-box" readonly>
        <input type="text" id="itemName" class="search-box" placeholder="Название предмета">
        <label>Локация:</label>
        <select id="itemLocation" class="search-box">
            <option value="Зал">Зал</option><option value="Кухня">Кухня</option><option value="Бар">Бар</option><option value="Склад">Склад</option><option value="Офис">Офис</option>
        </select>
        <label>Подгруппа:</label>
        <select id="addSubCatSelect" class="search-box" onchange="checkNewSub('add')"></select>
        <input type="text" id="addCustomSub" class="search-box" style="display:none; border:2px solid var(--oko-green);" placeholder="Название новой подгруппы">
        <label>Фотография:</label>
        <input type="file" id="itemPhoto" class="search-box" accept="image/*">
        <button class="btn btn-primary" onclick="saveNewItem()">Добавить в базу</button>
    </div></div>

    <div id="editModal" class="modal"><div class="modal-content">
        <button class="close-btn" onclick="closeModal('editModal')">&times;</button>
        <h2 style="color:var(--oko-green)">РЕДАКТИРОВАТЬ</h2><br>
        <input type="hidden" id="editItemTargetId">
        <label>Название:</label><input type="text" id="editItemName" class="search-box">
        <label>Локация:</label>
        <select id="editItemLocation" class="search-box">
            <option value="Зал">Зал</option><option value="Кухня">Кухня</option><option value="Бар">Бар</option><option value="Склад">Склад</option><option value="Офис">Офис</option>
        </select>
        <label>Подгруппа:</label><select id="editSubCatSelect" class="search-box" onchange="checkNewSub('edit')"></select>
        <input type="text" id="editCustomSub" class="search-box" style="display:none; border:2px solid var(--oko-green);" placeholder="Новая группа">
        <label>Сменить фото:</label><input type="file" id="editItemPhoto" class="search-box" accept="image/*">
        <button class="btn btn-primary" onclick="saveEditChanges()">Сохранить изменения</button>
    </div></div>

    <div id="itemModal" class="modal"><div class="modal-content" id="itemModalContent"></div></div>
    <div id="scannerModal" class="modal"><div class="modal-content"><button class="close-btn" onclick="closeScanner()">&times;</button><div id="reader"></div></div></div>

    <script>
        const USERS = { "Sam": "oko2024", "Radmir": "oko 2025" };

        const firebaseConfig = {
            apiKey: "AIzaSyAk1A8PBDpSQjjiFoKyprSvzK4jO9Us_34",
            authDomain: "inventory-oko.firebaseapp.com",
            databaseURL: "https://inventory-oko-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "inventory-oko",
            storageBucket: "inventory-oko.firebasestorage.app",
            messagingSenderId: "528327448142",
            appId: "1:528327448142:web:c0bde5327bd1464c81951f"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let items = [], subCategories = [], globalStatusFilter = 'all', html5QrCode = null;

        function checkAccess() {
            const l = document.getElementById('user-login').value;
            const p = document.getElementById('user-pass').value;
            if (USERS[l] === p) {
                localStorage.setItem('oko_auth', 'true');
                localStorage.setItem('oko_user', l);
                showApp();
            } else alert("Ошибка входа!");
        }
        function logout() { localStorage.removeItem('oko_auth'); localStorage.removeItem('oko_user'); location.reload(); }
        if (localStorage.getItem('oko_auth') === 'true') showApp();

        function showApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            db.ref('inventory').on('value', snap => {
                items = snap.val() ? Object.values(snap.val()) : [];
                renderItems(); updateStats();
                const urlId = new URLSearchParams(window.location.search).get('id');
                if (urlId) { window.history.replaceState({}, '', window.location.origin + window.location.pathname); showItemDetail(urlId); }
            });
            db.ref('settings/subCategories').on('value', snap => {
                subCategories = snap.val() ? Object.values(snap.val()) : [];
                updateDropdowns();
            });
            db.ref('.info/connected').on('value', snap => {
                const s = document.getElementById('syncStatus'), i = document.getElementById('syncIcon'), t = document.getElementById('syncText');
                if (snap.val()) { s.className = 'sync-status sync-online'; i.innerText = '🟢'; t.innerText = 'Онлайн'; }
                else { s.className = 'sync-status sync-offline'; i.innerText = '⚠️'; t.innerText = 'Офлайн'; }
            });
        }

        function isNameTaken(name, currentId = null) {
            return items.some(it => it.name.trim().toLowerCase() === name.trim().toLowerCase() && it.id !== currentId);
        }

        async function saveNewItem() {
            const id = document.getElementById('addId').value;
            const name = document.getElementById('itemName').value.trim();
            const loc = document.getElementById('itemLocation').value;
            let sub = document.getElementById('addSubCatSelect').value;
            const custom = document.getElementById('addCustomSub').value.trim();
            const file = document.getElementById('itemPhoto').files[0];
            const currentUser = localStorage.getItem('oko_user') || "Неизвестен";

            if (!name) return alert("Введите название!");
            if (isNameTaken(name)) return alert("Предмет с таким названием уже есть в базе!");
            
            if (sub === 'NEW') { if (!custom) return alert("Введите имя группы!"); sub = custom; db.ref('settings/subCategories').push(sub); }
            
            document.getElementById('loader').style.display = 'flex';
            try {
                let photo = 'https://via.placeholder.com/400x200?text=OKO';
                if (file) photo = await new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(file); });
                await db.ref('inventory/' + id).set({ 
                    id, name, location: loc, sub: sub || "Прочее", photo, status: 'ok', 
                    lastCheck: 'Нет', addedDate: new Date().toLocaleDateString('ru-RU'),
                    createdBy: currentUser, updatedBy: currentUser
                });
                document.getElementById('loader').style.display = 'none'; closeModal('addModal');
                document.getElementById('itemName').value = ""; document.getElementById('itemPhoto').value = "";
            } catch (e) { document.getElementById('loader').style.display = 'none'; alert(e.message); }
        }

        async function saveEditChanges() {
            const id = document.getElementById('editItemTargetId').value;
            const name = document.getElementById('editItemName').value.trim();
            const loc = document.getElementById('editItemLocation').value;
            let sub = document.getElementById('editSubCatSelect').value;
            const custom = document.getElementById('editCustomSub').value.trim();
            const file = document.getElementById('editItemPhoto').files[0];
            const currentUser = localStorage.getItem('oko_user') || "Неизвестен";

            if (!name) return alert("Имя не может быть пустым");
            if (isNameTaken(name, id)) return alert("Предмет с таким названием уже существует!");

            if (sub === 'NEW') { if (!custom) return alert("Группа!"); sub = custom; db.ref('settings/subCategories').push(sub); }
            
            document.getElementById('loader').style.display = 'flex';
            try {
                let up = { name, location: loc, sub: sub || "Прочее", updatedBy: currentUser };
                if (file) up.photo = await new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(file); });
                await db.ref('inventory/' + id).update(up);
                document.getElementById('loader').style.display = 'none'; closeModal('editModal'); setTimeout(() => showItemDetail(id), 300);
            } catch (e) { document.getElementById('loader').style.display = 'none'; alert(e.message); }
        }

        function renderItems() {
            const container = document.getElementById('itemsContainer'), search = document.getElementById('searchInput').value.toLowerCase();
            container.innerHTML = '';
            items.filter(i => {
                const ms = i.name.toLowerCase().includes(search) || i.id.toLowerCase().includes(search) || i.location.toLowerCase().includes(search) || (i.sub && i.sub.toLowerCase().includes(search));
                const mf = globalStatusFilter === 'all' ? true : i.status === globalStatusFilter;
                return ms && mf;
            }).forEach(item => {
                const div = document.createElement('div'); div.className = 'item-card';
                div.onclick = () => showItemDetail(item.id);
                const status = item.status === 'repair' ? '<div class="status-badge">РЕМОНТ</div>' : '';
                div.innerHTML = `${status}<div class="item-image-container"><img src="${item.photo}" class="item-image"></div><div class="item-content"><strong style="font-size:1.1rem;">${item.name}</strong><br><span style="font-size:0.85rem; color:#666;">ID: ${item.id} | 📍 ${item.location} | 📂 ${item.sub}</span><br><span style="font-size:0.8rem; color:#888;">Добавлен: ${item.addedDate || '---'}</span><br><div class="qr-wrapper"><div id="qr-${item.id}"></div></div></div>`;
                container.appendChild(div);
                new QRCode(document.getElementById(`qr-${item.id}`), { text: window.location.origin + window.location.pathname + "?id=" + item.id, width: 70, height: 70 });
            });
        }

        function showItemDetail(id) {
            const item = items.find(i => i.id === id); if (!item) return;
            const statusBtn = item.status === 'repair' ? `<button class="btn btn-success" onclick="upStat('${item.id}', 'ok')">✅ ВЕРНУТЬ В СТРОЙ</button>` : `<button class="btn btn-danger" onclick="upStat('${item.id}', 'repair')">🔧 В РЕМОНТ</button>`;
            
            document.getElementById('itemModalContent').innerHTML = `
                <button class="close-btn" onclick="closeModal('itemModal')">&times;</button>
                <div class="detail-photo-box"><img src="${item.photo}" class="detail-photo"></div>
                <h2 style="color:var(--oko-green); margin-bottom:5px;">${item.name}</h2>
                <div style="background:white; padding:15px; border:1px solid #ddd; margin-bottom:10px; font-size: 0.95rem; line-height: 1.6;">
                    <p><strong>ID:</strong> ${item.id}</p>
                    <p><strong>Локация:</strong> ${item.location}</p>
                    <p><strong>Группа:</strong> ${item.sub}</p>
                    <p><strong>Проверка:</strong> ${item.lastCheck}</p>
                    <p><strong>Добавил:</strong> ${item.createdBy || '---'}</p>
                    <p><strong>Изменил:</strong> ${item.updatedBy || '---'}</p>
                </div>
                <button class="btn btn-primary" onclick="markCheck('${item.id}')">ИНВЕНТАРИЗАЦИЯ ПРОЙДЕНА</button>
                <button class="btn" onclick="openEditModal('${item.id}')">📦 ПЕРЕМЕСТИТЬ / ИЗМЕНИТЬ</button>
                ${statusBtn}<button class="btn" onclick="printQR('${item.id}')">Печать QR</button>
                <button class="btn btn-danger" onclick="deleteItem('${item.id}')">Удалить объект</button>`;
            document.getElementById('itemModal').classList.add('active');
        }

        function printAllQR() {
            if (items.length === 0) return alert("База пуста!");
            const pWin = window.open('', '_blank');
            pWin.document.write(`<html><head><title>Печать QR</title><style>body { font-family: "Times New Roman", serif; display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }.qr-card { border: 1px solid #ccc; padding: 10px; margin: 10px; text-align: center; width: 160px; }.qr-name { font-weight: bold; font-size: 12px; height: 32px; overflow: hidden; }.qr-id { font-size: 10px; color: #666; margin-top: 4px; }</style><script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script></head><body><div id="grid" style="display: flex; flex-wrap: wrap; justify-content: center;"></div><script>const data = ${JSON.stringify(items)};const grid = document.getElementById('grid');const url = "${window.location.origin + window.location.pathname}";data.forEach(it => {const div = document.createElement('div'); div.className = 'qr-card';div.innerHTML = '<div class="qr-name">' + it.name + '</div><div id="q-' + it.id + '"></div><div class="qr-id">' + it.id + '</div>';grid.appendChild(div);new QRCode(document.getElementById('q-' + it.id), { text: url + "?id=" + it.id, width: 130, height: 130 });});setTimeout(() => { window.print(); window.close(); }, 1200);<\/script></body></html>`);
            pWin.document.close();
            document.getElementById('fabMenu').classList.remove('active');
        }
        function updateDropdowns() { ['addSubCatSelect', 'editSubCatSelect'].forEach(id => { const sel = document.getElementById(id); if(!sel) return; sel.innerHTML = '<option value="">-- Подгруппа --</option>'; subCategories.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`); sel.innerHTML += '<option value="NEW" style="color:blue;">+ НОВАЯ</option>'; }); }
        function checkNewSub(type) { const val = document.getElementById(type === 'add' ? 'addSubCatSelect' : 'editSubCatSelect').value; document.getElementById(type === 'add' ? 'addCustomSub' : 'editCustomSub').style.display = (val === 'NEW') ? 'block' : 'none'; }
        function setStatFilter(s) { globalStatusFilter = s; renderItems(); }
        function filterByLoc(l) { const inp = document.getElementById('searchInput'); inp.value = (inp.value === l) ? '' : l; renderItems(); }
        function openAddModal() { document.getElementById('addId').value = 'OKO-' + Math.floor(1000 + Math.random() * 9000); document.getElementById('fabMenu').classList.remove('active'); document.getElementById('addModal').classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function openEditModal(id) { const it = items.find(i => i.id === id); document.getElementById('editItemTargetId').value = id; document.getElementById('editItemName').value = it.name; document.getElementById('editItemLocation').value = it.location; document.getElementById('editSubCatSelect').value = subCategories.includes(it.sub) ? it.sub : ""; document.getElementById('editModal').classList.add('active'); }
        function upStat(id, s) { db.ref('inventory/' + id).update({ status: s }); setTimeout(() => showItemDetail(id), 300); }
        function markCheck(id) { db.ref('inventory/' + id).update({ lastCheck: new Date().toLocaleDateString('ru-RU') }); closeModal('itemModal'); }
        async function deleteItem(id) { if (confirm("Удалить объект?")) { await db.ref('inventory/' + id).remove(); closeModal('itemModal'); } }
        function updateStats() { document.getElementById('totalItems').innerText = items.length; document.getElementById('okItems').innerText = items.filter(i => i.status === 'ok').length; document.getElementById('repairItems').innerText = items.filter(i => i.status === 'repair').length; document.getElementById('locHall').innerText = items.filter(i => i.location === 'Зал').length; document.getElementById('locKitchen').innerText = items.filter(i => i.location === 'Кухня').length; document.getElementById('locBar').innerText = items.filter(i => i.location === 'Бар').length; document.getElementById('locWh').innerText = items.filter(i => i.location === 'Склад').length; }
        function openScanner() { document.getElementById('scannerModal').classList.add('active'); html5QrCode = new Html5Qrcode("reader"); html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, t => { const id = t.includes('?id=') ? t.split('?id=')[1] : t; closeScanner(); showItemDetail(id); }); }
        function closeScanner() { if (html5QrCode) html5QrCode.stop(); closeModal('scannerModal'); }
        function printQR(id) { const it = items.find(i => i.id === id); const win = window.open('', '_blank'); win.document.write(`<html><body style="text-align:center; padding:30px; font-family:serif;"><h2>${it.name}</h2><div id="q" style="display:inline-block;"></div><script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script><script>new QRCode(document.getElementById('q'), {text: "${window.location.origin + window.location.pathname}?id=${id}", width: 150, height: 150}); setTimeout(() => window.print(), 500);<\/script></body></html>`); win.document.close(); }
        function exportToExcel() { const data = items.map(i => ({ ID: i.id, Имя: i.name, Локация: i.location, Группа: i.sub, Статус: i.status })); const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Inventory"); XLSX.writeFile(wb, "OKO_Cloud.xlsx"); }
    </script>
</body>
</html>
