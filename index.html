<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Инвентарь ОКО Cloud</title>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --oko-green: #5C6041;
            --oko-beige: #D9D1B5;
            --oko-brown: #3B352A;
            --oko-white: #F4EEDC;
            --oko-red: #cc0000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Times New Roman", Times, serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--oko-white); color: var(--oko-brown); min-height: 100vh; }

        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
        .login-card { background: white; padding: 30px; border-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; border: 2px solid var(--oko-beige); }

        #main-app { display: none; padding-bottom: 80px; }
        .container { max-width: 700px; margin: 0 auto; padding: 10px; }
        
        header { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 15px 0; border-bottom: 1px solid var(--oko-beige); margin-bottom: 15px; }
        .header-title { font-size: 1.2rem; font-weight: bold; color: var(--oko-green); text-transform: uppercase; white-space: nowrap; }
        .logout-btn { justify-self: end; background: none; border: 1px solid var(--oko-brown); padding: 5px 10px; cursor: pointer; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; border-radius: 4px; }

        .online-status-box { display: flex; align-items: center; gap: 6px; font-size: 0.7rem; font-weight: bold; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; transition: 0.3s; }
        .dot.active { background: #28a745; box-shadow: 0 0 8px #28a745; }

        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        .stat-card { background: var(--oko-beige); padding: 10px 2px; border-radius: 4px; text-align: center; border: 2px solid transparent; cursor: pointer; transition: 0.2s; }
        .stat-card.active-filter { border-color: var(--oko-green); background: #c9c0a3; }
        .stat-number { font-size: 1.2rem; font-weight: bold; color: var(--oko-green); }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; font-weight: bold; }
        .loc-stats .stat-card { background: #E5E0CD; }

        .sub-stats-container { background: #fff; padding: 10px; border-radius: 4px; border: 1px solid var(--oko-beige); margin-bottom: 15px; font-size: 0.85rem; }
        .sub-stat-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px dotted #ccc; }
        .sub-stat-row:last-child { border-bottom: none; }
        .sub-stat-name { font-weight: bold; color: var(--oko-brown); }
        .sub-stat-counts { color: var(--oko-green); }

        .search-box { width: 100%; padding: 12px; border: 1px solid var(--oko-beige); margin-bottom: 15px; outline: none; font-size: 1rem; background: white; }

        .group-header { background: var(--oko-green); color: white; padding: 8px 12px; margin: 20px 0 10px 0; border-radius: 4px; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }

        .item-card { background: white; border-radius: 4px; overflow: hidden; margin-bottom: 12px; border: 1px solid var(--oko-beige); cursor: pointer; position: relative; }
        .item-image-container { width: 100%; height: 250px; background: #222; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .item-image { width: 100%; height: 100%; object-fit: contain; }
        .item-content { padding: 12px; position: relative; }
        .status-badge { position: absolute; top: 10px; right: 10px; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; z-index: 5; background: #ffebee; color: #c62828; border: 1px solid #c62828; }

        .card-qr-box { position: absolute; bottom: 12px; right: 12px; width: 60px; height: 60px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; overflow-y: auto; }
        .modal.active { display: block; }
        #editModal { z-index: 3000 !important; }

        .modal-content { background: var(--oko-white); width: 100%; min-height: 100vh; padding: 20px; position: relative; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 2.5rem; border: none; background: none; cursor: pointer; color: var(--oko-brown); z-index: 10; }

        .detail-photo-box { background: #222; border-radius: 4px; display: flex; justify-content: center; height: 220px; overflow: hidden; margin-bottom: 15px; }
        .detail-photo { height: 100%; object-fit: contain; }

        .btn-action { padding: 12px; border: 1px solid var(--oko-brown); border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 8px; text-transform: uppercase; background: white; font-size: 0.9rem; color: var(--oko-brown); }
        .btn-green { background: var(--oko-green); color: white; border: none; }
        .btn-danger { color: var(--oko-red); border-color: var(--oko-red); }

        .fab { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: var(--oko-green); color: white; border-radius: 50%; border: none; font-size: 2rem; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 1000; cursor: pointer; }
        .fab-menu { position: fixed; bottom: 90px; right: 20px; display: none; flex-direction: column; gap: 12px; z-index: 1000; }
        .fab-menu.active { display: flex; }
        .fab-item { background: white; padding: 12px 20px; border-radius: 4px; font-weight: bold; border: 1px solid var(--oko-beige); font-size: 0.9rem; text-transform: uppercase; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); cursor: pointer; color: var(--oko-brown); }

        .loader-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
        .action-box { background: #ece7d5; padding: 10px; border-radius: 4px; margin-bottom: 10px; border: 1px solid var(--oko-beige); }
    </style>
</head>
<body>

    <div id="loader" class="loader-overlay"><h2>ОБРАБОТКА...</h2></div>

    <div id="login-screen">
        <div class="login-card">
            <h1 style="color: var(--oko-green); margin-bottom: 20px;">Инвентарь ОКО</h1>
            <input type="text" id="user-login" class="search-box" placeholder="Логин" autocapitalize="none" autocomplete="off">
            <input type="password" id="user-pass" class="search-box" placeholder="Пароль" autocapitalize="none">
            <button class="btn-action btn-green" onclick="checkAccess()">ВОЙТИ</button>
        </div>
    </div>

    <div id="main-app">
        <div class="container">
            <header>
                <div class="online-status-box"><div id="statusDot" class="dot"></div><span id="statusLabel">OFFLINE</span></div>
                <div class="header-title">Инвентарь ОКО</div>
                <button class="logout-btn" onclick="logout()">Выход</button>
            </header>

            <div class="stats-bar">
                <div class="stat-card" id="btn-all" onclick="setStatFilter('all')"><div class="stat-number" id="totalItems">0</div><div class="stat-label">ШТ. ВСЕГО</div></div>
                <div class="stat-card" id="btn-ok" onclick="setStatFilter('ok')"><div class="stat-number" id="okItems">0</div><div class="stat-label">ШТ. ОК</div></div>
                <div class="stat-card" id="btn-repair" onclick="setStatFilter('repair')"><div class="stat-number" id="repairItems">0</div><div class="stat-label">ШТ. РЕМОНТ</div></div>
            </div>

            <div class="stats-bar loc-stats">
                <div class="stat-card" onclick="filterByLoc('Зал')"><div class="stat-number" id="locHall">0</div><div class="stat-label">ЗАЛ</div></div>
                <div class="stat-card" onclick="filterByLoc('Кухня')"><div class="stat-number" id="locKitchen">0</div><div class="stat-label">КУХНЯ</div></div>
                <div class="stat-card" onclick="filterByLoc('Бар')"><div class="stat-number" id="locBar">0</div><div class="stat-label">БАР</div></div>
                <div class="stat-card" onclick="filterByLoc('Склад')"><div class="stat-number" id="locWh">0</div><div class="stat-label">СКЛАД</div></div>
            </div>

            <div id="subStatsList" class="sub-stats-container">
                <div style="text-align:center; font-weight:bold; margin-bottom:5px; border-bottom:1px solid var(--oko-beige);">ДИНАМИКА ГРУПП (ШТ)</div>
                <div id="subStatsContent"></div>
            </div>

            <input type="text" class="search-box" id="searchInput" placeholder="Поиск..." onkeyup="renderItems()">
            <div id="itemsContainer"></div>
        </div>

        <button class="fab" onclick="document.getElementById('fabMenu').classList.toggle('active')">+</button>
        <div class="fab-menu" id="fabMenu">
            <button class="fab-item" onclick="openAddModal()">Добавить объект</button>
            <button class="fab-item" onclick="openScanner()">Сканер QR</button>
            <button class="fab-item" onclick="printAllQR()" style="background: #eef2ff; color: #3730a3;">Печать всех QR</button>
            <button class="fab-item" onclick="exportToExcel()">Excel отчет</button>
        </div>
    </div>

    <!-- МОДАЛКИ -->
    <div id="addModal" class="modal"><div class="modal-content">
        <button class="close-btn" onclick="closeModal('addModal')">&times;</button>
        <h2 style="color:var(--oko-green)">НОВЫЙ ОБЪЕКТ</h2><br>
        <input type="text" id="addId" class="search-box" readonly>
        <input type="text" id="itemName" class="search-box" placeholder="Название">
        <label>Количество (шт.):</label><input type="number" id="itemQty" class="search-box" value="1" min="1">
        <label>Локация:</label><select id="itemLocation" class="search-box"><option value="Зал">Зал</option><option value="Кухня">Кухня</option><option value="Бар">Бар</option><option value="Склад">Склад</option></select>
        <label>Подгруппа:</label><select id="addSubCatSelect" class="search-box" onchange="checkNewSub('add')"></select>
        <input type="text" id="addCustomSub" class="search-box" style="display:none;" placeholder="Новая группа">
        <label>Фотография:</label><input type="file" id="itemPhoto" class="search-box" accept="image/*">
        <button class="btn-action btn-green" onclick="saveNewItem()">СОХРАНИТЬ</button>
    </div></div>

    <div id="editModal" class="modal"><div class="modal-content">
        <button class="close-btn" onclick="closeModal('editModal')">&times;</button>
        <h2 style="color:var(--oko-green)">ИЗМЕНЕНИЕ</h2><br>
        <input type="hidden" id="editItemTargetId">
        <label>Название:</label><input type="text" id="editItemName" class="search-box">
        <div class="action-box">
            <label>Переместить часть (шт.):</label><input type="number" id="moveQty" class="search-box" value="0">
            <label>Куда:</label><select id="editItemLocation" class="search-box"><option value="Зал">Зал</option><option value="Кухня">Кухня</option><option value="Бар">Бар</option><option value="Склад">Склад</option></select>
        </div>
        <label>Подгруппа:</label><select id="editSubCatSelect" class="search-box" onchange="checkNewSub('edit')"></select>
        <input type="text" id="editCustomSub" class="search-box" style="display:none;" placeholder="Новая группа">
        <button class="btn-action btn-green" onclick="saveEditChanges()">ПРИМЕНИТЬ</button>
    </div></div>

    <div id="itemModal" class="modal"><div class="modal-content" id="itemModalContent"></div></div>
    <div id="scannerModal" class="modal"><div class="modal-content"><button class="close-btn" onclick="closeScanner()">&times;</button><div id="reader"></div></div></div>

    <script>
        const USERS = { "Sam": "oko2024", "Radmir": "oko 2025" };
        const firebaseConfig = {
            apiKey: "AIzaSyAk1A8PBDpSQjjiFoKyprSvzK4jO9Us_34",
            authDomain: "inventory-oko.firebaseapp.com",
            databaseURL: "https://inventory-oko-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "inventory-oko",
            storageBucket: "inventory-oko.firebasestorage.app",
            messagingSenderId: "528327448142",
            appId: "1:528327448142:web:c0bde5327bd1464c81951f"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let items = [], subCategories = [], globalStatusFilter = 'all', html5QrCode = null;

        function checkAccess() {
            const l = document.getElementById('user-login').value.trim();
            const p = document.getElementById('user-pass').value.trim();
            if (USERS[l] === p) { localStorage.setItem('oko_auth', 'true'); localStorage.setItem('oko_user', l); showApp(); } 
            else alert("Ошибка входа!");
        }
        function logout() { localStorage.removeItem('oko_auth'); localStorage.removeItem('oko_user'); location.reload(); }
        if (localStorage.getItem('oko_auth') === 'true') showApp();

        function showApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            db.ref('inventory').on('value', snap => {
                items = snap.val() ? Object.values(snap.val()) : [];
                renderItems(); updateStats();
            });
            db.ref('settings/subCategories').on('value', snap => {
                subCategories = snap.val() ? Object.values(snap.val()) : [];
                updateDropdowns();
            });
            db.ref('.info/connected').on('value', snap => {
                const dot = document.getElementById('statusDot'), label = document.getElementById('statusLabel');
                if (snap.val()) { dot.classList.add('active'); label.innerText = 'ONLINE'; } 
                else { dot.classList.remove('active'); label.innerText = 'OFFLINE'; }
            });
        }

        async function saveNewItem() {
            const id = document.getElementById('addId').value, name = document.getElementById('itemName').value.trim();
            const qty = parseInt(document.getElementById('itemQty').value) || 1;
            const loc = document.getElementById('itemLocation').value;
            let sub = document.getElementById('addSubCatSelect').value, custom = document.getElementById('addCustomSub').value.trim(), file = document.getElementById('itemPhoto').files[0];
            const user = localStorage.getItem('oko_user') || "---";

            if (!name) return alert("Введите название!");
            if (sub === 'NEW') { sub = custom; db.ref('settings/subCategories').push(sub); }
            
            document.getElementById('loader').style.display = 'flex';
            try {
                let photo = 'https://via.placeholder.com/400x200?text=НЕТ+ФОТО';
                if (file) photo = await new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(file); });
                await db.ref('inventory/' + id).set({ id, name, qty, location: loc, sub: sub || "Прочее", photo, status: 'ok', lastCheck: 'Нет', lastCheckBy: '---', addedDate: new Date().toLocaleDateString('ru-RU'), createdBy: user, updatedBy: user });
                document.getElementById('loader').style.display = 'none'; closeModal('addModal');
            } catch (e) { document.getElementById('loader').style.display = 'none'; alert(e.message); }
        }

        function renderItems() {
            const container = document.getElementById('itemsContainer'), search = document.getElementById('searchInput').value.toLowerCase();
            container.innerHTML = '';
            const filtered = items.filter(i => {
                const ms = i.name.toLowerCase().includes(search) || i.id.toLowerCase().includes(search) || i.location.toLowerCase().includes(search);
                const mf = globalStatusFilter === 'all' ? true : i.status === globalStatusFilter;
                return ms && mf;
            });
            const groups = {};
            filtered.forEach(item => { const s = item.sub || "Прочее"; if (!groups[s]) groups[s] = []; groups[s].push(item); });
            Object.keys(groups).sort().forEach(s => {
                const header = document.createElement('div'); header.className = 'group-header'; header.innerText = s; container.appendChild(header);
                groups[s].forEach(item => {
                    const div = document.createElement('div'); div.className = 'item-card'; div.onclick = () => showItemDetail(item.id);
                    const status = item.status === 'repair' ? '<div class="status-badge">РЕМОНТ</div>' : '';
                    div.innerHTML = `
                        ${status}<div class="item-image-container"><img src="${item.photo}" class="item-image"></div>
                        <div class="item-content">
                            <strong style="font-size:1.1rem;">${item.name}</strong><br>
                            <span style="color:var(--oko-green); font-weight:bold;">Количество: ${item.qty || 1} шт.</span><br>
                            <span style="font-size:0.85rem; color:#666;">ID: ${item.id} | 📍 ${item.location}</span>
                            <div class="card-qr-box" id="qr-card-${item.id}"></div>
                        </div>`;
                    container.appendChild(div);
                    new QRCode(document.getElementById(`qr-card-${item.id}`), { text: window.location.origin + window.location.pathname + "?id=" + item.id, width: 60, height: 60 });
                });
            });
        }

        function showItemDetail(id) {
            const item = items.find(i => i.id === id); if (!item) return;
            const statusBtn = item.status === 'repair' ? `<button class="btn-action btn-green" onclick="handleStatus('${item.id}', 'ok')">✅ ВЕРНУТЬ В СТРОЙ</button>` : `
                <div class="action-box">
                    <label>В ремонт (шт.):</label><input type="number" id="repairQty" class="search-box" value="1" max="${item.qty || 1}">
                    <input type="text" id="repairReason" class="search-box" placeholder="Причина">
                    <button class="btn-action btn-danger" onclick="handleStatus('${item.id}', 'repair')">🔧 В РЕМОНТ</button>
                </div>`;
            document.getElementById('itemModalContent').innerHTML = `
                <button class="close-btn" onclick="closeModal('itemModal')">&times;</button>
                <div class="detail-photo-box"><img src="${item.photo}" class="detail-photo"></div>
                <h2>${item.name}</h2>
                <p><b>Кол-во: ${item.qty || 1} шт.</b> | Локация: ${item.location}</p>
                <p>ID: ${item.id} | Группа: ${item.sub}</p>
                ${item.reason ? `<p style="color:red">Причина: ${item.reason}</p>` : ''}
                <hr style="margin:10px 0;">
                <button class="btn-action btn-green" onclick="markCheck('${item.id}')">ИНВЕНТАРИЗАЦИЯ ПРОЙДЕНА</button>
                <button class="btn-action" onclick="openEditModal('${item.id}')">📦 ПЕРЕМЕСТИТЬ / ИЗМЕНИТЬ</button>
                ${statusBtn}
                <button class="btn-action" onclick="printQR('${item.id}')">ПЕЧАТЬ QR (${item.qty || 1} шт)</button>
                <button class="btn-action btn-danger" onclick="deleteItem('${item.id}')">УДАЛИТЬ</button>`;
            document.getElementById('itemModal').classList.add('active');
        }

        async function handleStatus(id, newStat) {
            const original = items.find(i => i.id === id);
            const user = localStorage.getItem('oko_user') || "---";
            if (newStat === 'repair') {
                const rQty = parseInt(document.getElementById('repairQty').value) || 0;
                const reason = document.getElementById('repairReason').value;
                if (rQty < (original.qty || 1)) {
                    const newId = 'OKO-' + Math.floor(1000 + Math.random() * 9000);
                    await db.ref('inventory/' + newId).set({ ...original, id: newId, qty: rQty, status: 'repair', reason: reason, updatedBy: user });
                    await db.ref('inventory/' + id).update({ qty: (original.qty || 1) - rQty });
                } else await db.ref('inventory/' + id).update({ status: 'repair', reason: reason, updatedBy: user });
            } else await db.ref('inventory/' + id).update({ status: 'ok', reason: '' });
            closeModal('itemModal');
        }

        async function saveEditChanges() {
            const id = document.getElementById('editItemTargetId').value;
            const original = items.find(i => i.id === id);
            const moveQty = parseInt(document.getElementById('moveQty').value) || 0;
            const user = localStorage.getItem('oko_user') || "---";
            if (moveQty > 0 && moveQty < (original.qty || 1)) {
                const newId = 'OKO-' + Math.floor(1000 + Math.random() * 9000);
                await db.ref('inventory/' + newId).set({ ...original, id: newId, qty: moveQty, location: document.getElementById('editItemLocation').value, updatedBy: user });
                await db.ref('inventory/' + id).update({ qty: (original.qty || 1) - moveQty, name: document.getElementById('editItemName').value });
            } else await db.ref('inventory/' + id).update({ name: document.getElementById('editItemName').value, location: document.getElementById('editItemLocation').value });
            closeModal('editModal');
        }

        function updateStats() {
            let total = 0, ok = 0, rep = 0, h = 0, k = 0, b = 0, s = 0;
            items.forEach(i => {
                const q = parseInt(i.qty) || 1; total += q;
                if (i.status === 'ok') ok += q; else rep += q;
                if (i.location === 'Зал') h += q; else if (i.location === 'Кухня') k += q; else if (i.location === 'Бар') b += q; else if (i.location === 'Склад') s += q;
            });
            document.getElementById('totalItems').innerText = total; document.getElementById('okItems').innerText = ok; document.getElementById('repairItems').innerText = rep;
            document.getElementById('locHall').innerText = h; document.getElementById('locKitchen').innerText = k; document.getElementById('locBar').innerText = b; document.getElementById('locWh').innerText = s;
            const subContainer = document.getElementById('subStatsContent'); subContainer.innerHTML = '';
            [...new Set(items.map(i => i.sub || "Прочее"))].sort().forEach(sn => {
                const cur = items.filter(i => i.sub === sn).reduce((acc, i) => acc + (parseInt(i.qty) || 1), 0);
                const row = document.createElement('div'); row.className = 'sub-stat-row'; row.innerHTML = `<span>${sn}</span><span style="color:var(--oko-green)">${cur} шт.</span>`; subContainer.appendChild(row);
            });
        }

        function printQR(id) {
            const it = items.find(i => i.id === id); const win = window.open('', '_blank');
            win.document.write(`<html><head><script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script></head><body><div id="g"></div><script>
                for(let i=0; i<${it.qty || 1}; i++) {
                    const d = document.createElement('div'); d.style = "display:inline-block; margin:10px; text-align:center; border:1px solid #eee; padding:5px; width:90px; font-size:10px; font-family:sans-serif;";
                    d.innerHTML = '<div>${it.name}</div><div id="q'+i+'"></div><div>${it.id}</div>'; document.getElementById('g').appendChild(d);
                    new QRCode(document.getElementById('q'+i), {text: "${window.location.origin + window.location.pathname}?id=${id}", width: 80, height: 80});
                }
                window.onload = () => setTimeout(() => { window.print(); window.close(); }, 700);
            <\/script></body></html>`);
            win.document.close();
        }

        function printAllQR() {
            const win = window.open('', '_blank');
            win.document.write(`<html><head><script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script></head><body><div id="g"></div><script>
                const data = ${JSON.stringify(items)};
                data.forEach(it => {
                    for(let i=0; i<(it.qty || 1); i++) {
                        const d = document.createElement('div'); d.style = "display:inline-block; margin:5px; text-align:center; border:0.5px solid #ccc; padding:3px; width:80px; font-size:8px; font-family:sans-serif;";
                        d.innerHTML = '<div>'+it.name+'</div><div id="q'+it.id+i+'"></div><div>'+it.id+'</div>'; document.getElementById('g').appendChild(d);
                        new QRCode(document.getElementById('q'+it.id+i), {text: "${window.location.origin + window.location.pathname}?id="+it.id, width: 70, height: 70});
                    }
                });
                window.onload = () => setTimeout(() => { window.print(); window.close(); }, 1500);
            <\/script></body></html>`);
            win.document.close();
        }

        function updateDropdowns() { ['addSubCatSelect', 'editSubCatSelect'].forEach(id => { const sel = document.getElementById(id); sel.innerHTML = '<option value="">-- Подгруппа --</option>'; subCategories.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`); sel.innerHTML += '<option value="NEW" style="color:blue;">+ НОВАЯ</option>'; }); }
        function checkNewSub(t) { const v = document.getElementById(t === 'add' ? 'addSubCatSelect' : 'editSubCatSelect').value; document.getElementById(t === 'add' ? 'addCustomSub' : 'editCustomSub').style.display = (v === 'NEW') ? 'block' : 'none'; }
        function setStatFilter(s) { globalStatusFilter = s; renderItems(); }
        function filterByLoc(l) { const i = document.getElementById('searchInput'); i.value = (i.value === l) ? '' : l; renderItems(); }
        function openAddModal() { document.getElementById('addId').value = 'OKO-' + Math.floor(1000 + Math.random() * 9999); document.getElementById('fabMenu').classList.remove('active'); document.getElementById('addModal').classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function openEditModal(id) { const it = items.find(i => i.id === id); document.getElementById('editItemTargetId').value = id; document.getElementById('editItemName').value = it.name; document.getElementById('editModal').classList.add('active'); }
        function markCheck(id) { const u = localStorage.getItem('oko_user') || "---"; db.ref('inventory/' + id).update({ lastCheck: new Date().toLocaleDateString('ru-RU'), lastCheckBy: u }); closeModal('itemModal'); }
        async function deleteItem(id) { if (confirm("Удалить?")) { await db.ref('inventory/' + id).remove(); closeModal('itemModal'); } }
        function openScanner() { document.getElementById('scannerModal').classList.add('active'); html5QrCode = new Html5Qrcode("reader"); html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, t => { const id = t.includes('?id=') ? t.split('?id=')[1] : t; closeScanner(); showItemDetail(id); }); }
        function closeScanner() { if (html5QrCode) html5QrCode.stop(); closeModal('scannerModal'); }
        function exportToExcel() { const data = items.map(i => ({ ID: i.id, Имя: i.name, Кол_во: i.qty || 1, Локация: i.location, Статус: i.status })); const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Inventory"); XLSX.writeFile(wb, "OKO.xlsx"); }
    </script>
</body>
</html>
