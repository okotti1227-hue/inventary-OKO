<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Инвентарь ОКО</title>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --oko-green: #5C6041;
            --oko-beige: #D9D1B5;
            --oko-brown: #3B352A;
            --oko-white: #F4EEDC;
            --oko-red: #cc0000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Times New Roman", Times, serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--oko-white); color: var(--oko-brown); min-height: 100vh; }

        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
        .login-card { background: white; padding: 30px; border-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; border: 2px solid var(--oko-beige); }

        #main-app { display: none; padding-bottom: 80px; }
        .container { max-width: 700px; margin: 0 auto; padding: 10px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid var(--oko-beige); margin-bottom: 15px; }
        header h1 { font-size: 1.4rem; font-weight: bold; color: var(--oko-green); text-transform: uppercase; }
        .logout-btn { padding: 5px 10px; font-size: 0.8rem; background: var(--oko-brown); color: white; border: none; cursor: pointer; }

        /* СЕТКА СТАТИСТИКИ */
        .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 8px; }
        .stat-card { background: var(--oko-beige); padding: 10px 2px; border-radius: 4px; text-align: center; border: 1px solid rgba(0,0,0,0.05); }
        .stat-number { font-size: 1.1rem; font-weight: bold; color: var(--oko-green); }

        /* Кликабельная статистика локаций */
        .loc-stats .stat-card { cursor: pointer; background: #E5E0CD; transition: transform 0.1s, background 0.2s; }
        .loc-stats .stat-card:active { transform: scale(0.95); background: var(--oko-beige); }

        .search-box { width: 100%; padding: 12px; border: 1px solid var(--oko-beige); margin-bottom: 15px; outline: none; font-size: 1rem; background: white; border-radius: 4px; }

        .item-card { background: white; border-radius: 4px; overflow: hidden; margin-bottom: 12px; border: 1px solid var(--oko-beige); cursor: pointer; position: relative; }
        .status-badge { position: absolute; top: 10px; right: 10px; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; z-index: 5; }
        .status-repair { background: #ffebee; color: #c62828; border: 1px solid #c62828; }

        .item-image { width: 100%; height: 180px; object-fit: cover; background: #eee; }
        .item-content { padding: 12px; }
        .qr-wrapper { background: white; padding: 8px; display: inline-block; border: 1px solid #ddd; margin-top: 10px; }

        .btn { padding: 12px; border: 1px solid var(--oko-brown); border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 8px; text-transform: uppercase; background: white; }
        .btn-primary { background: var(--oko-green); color: white; border: none; }
        .btn-danger { color: var(--oko-red); border-color: var(--oko-red); }
        .btn-success { color: #2e7d32; border-color: #2e7d32; }
        
        .loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; overflow-y: auto; }
        .modal.active { display: block; }
        #transferModal { z-index: 3000; } /* Всегда поверх других модалок */
        
        .modal-content { background: var(--oko-white); width: 100%; min-height: 100vh; padding: 20px; position: relative; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 2.5rem; border: none; background: none; cursor: pointer; color: var(--oko-brown); z-index: 10; }

        .detail-photo { width: 100%; max-height: 300px; object-fit: contain; background: #000; border-radius: 4px; margin-bottom: 15px; }

        .fab { position: fixed; bottom: 20px; right: 20px; width: 55px; height: 55px; background: var(--oko-green); color: white; border-radius: 50%; border: none; font-size: 1.8rem; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 1000; }
        .fab-menu { position: fixed; bottom: 85px; right: 20px; display: none; flex-direction: column; gap: 10px; z-index: 1000; }
        .fab-menu.active { display: flex; }
        .fab-item { background: white; padding: 10px 15px; border-radius: 4px; font-weight: bold; border: 1px solid var(--oko-beige); font-size: 0.8rem; }

        .edit-input { display: none; margin-bottom: 10px; border: 2px solid var(--oko-green); }
    </style>
</head>
<body>

    <div id="loader" class="loading-overlay"><h2>ОБРАБОТКА...</h2></div>

    <div id="login-screen">
        <div class="login-card">
            <h1 style="color: var(--oko-green);">ИНВЕНТАРЬ ОКО</h1><br>
            <input type="text" id="user-login" class="search-box" placeholder="Логин">
            <input type="password" id="user-pass" class="search-box" placeholder="Пароль">
            <button class="btn btn-primary" onclick="checkAccess()">Войти</button>
        </div>
    </div>

    <div id="main-app">
        <div class="container">
            <header>
                <h1>📦 ОКО</h1>
                <button class="logout-btn" onclick="logout()">ВЫЙТИ</button>
            </header>

            <!-- Основная статистика -->
            <div class="stats-bar">
                <div class="stat-card"><div class="stat-number" id="totalItems">0</div><div style="font-size:0.6rem">ВСЕГО</div></div>
                <div class="stat-card"><div class="stat-number" id="okItems">0</div><div style="font-size:0.6rem">ОК</div></div>
                <div class="stat-card"><div class="stat-number" id="repairItems">0</div><div style="font-size:0.6rem">РЕМОНТ</div></div>
                <div class="stat-card"><div class="stat-number" id="checkToday">0</div><div style="font-size:0.6rem">СЕГОДНЯ</div></div>
            </div>

            <!-- Статистика по локациям (кликая, фильтруем список) -->
            <div class="stats-bar loc-stats">
                <div class="stat-card" onclick="filterByLoc('Зал')"><div class="stat-number" id="locHall">0</div><div style="font-size:0.6rem">ЗАЛ</div></div>
                <div class="stat-card" onclick="filterByLoc('Кухня')"><div class="stat-number" id="locKitchen">0</div><div style="font-size:0.6rem">КУХНЯ</div></div>
                <div class="stat-card" onclick="filterByLoc('Бар')"><div class="stat-number" id="locBar">0</div><div style="font-size:0.6rem">БАР</div></div>
                <div class="stat-card" onclick="filterByLoc('Склад')"><div class="stat-number" id="locWh">0</div><div style="font-size:0.6rem">СКЛАД</div></div>
            </div>

            <input type="text" class="search-box" id="searchInput" placeholder="Поиск (название, ID или локация)..." onkeyup="renderItems()">
            <div id="itemsContainer"></div>
        </div>

        <button class="fab" onclick="document.getElementById('fabMenu').classList.toggle('active')">+</button>
        <div class="fab-menu" id="fabMenu">
            <button class="fab-item" onclick="openAddModal()">Добавить</button>
            <button class="fab-item" onclick="openScanner()">Сканер</button>
            <button class="fab-item" onclick="exportToExcel()">Excel</button>
        </div>
    </div>

    <!-- Модалки -->
    <div id="addModal" class="modal"><div class="modal-content">
        <button class="close-btn" onclick="closeModal('addModal')">&times;</button>
        <h2>НОВЫЙ ОБЪЕКТ</h2><br>
        <input type="text" id="addId" class="search-box" readonly>
        <input type="text" id="addName" class="search-box" placeholder="Название">
        <label>Локация:</label>
        <select id="addLoc" class="search-box">
            <option value="Офис">Офис</option>
            <option value="Зал">Зал</option>
            <option value="Кухня">Кухня</option>
            <option value="Бар">Бар</option>
            <option value="Склад">Склад</option>
        </select>
        <label>Подгруппа:</label>
        <select id="addSubCatSelect" class="search-box" onchange="checkNewSub('add')"></select>
        <input type="text" id="addCustomSub" class="search-box edit-input" placeholder="Название подгруппы">
        <input type="file" id="addPhoto" class="search-box" accept="image/*">
        <button class="btn btn-primary" onclick="saveNewItem()">Сохранить</button>
    </div></div>

    <div id="transferModal" class="modal"><div class="modal-content">
        <button class="close-btn" onclick="closeModal('transferModal')">&times;</button>
        <h2>ПЕРЕМЕЩЕНИЕ</h2><br>
        <input type="hidden" id="editItemId">
        <label>Новая локация:</label>
        <select id="editLoc" class="search-box">
            <option value="Офис">Офис</option>
            <option value="Зал">Зал</option>
            <option value="Кухня">Кухня</option>
            <option value="Бар">Бар</option>
            <option value="Склад">Склад</option>
        </select>
        <label>Подгруппа:</label>
        <select id="editSubCatSelect" class="search-box" onchange="checkNewSub('edit')"></select>
        <input type="text" id="editCustomSub" class="search-box edit-input" placeholder="Название подгруппы">
        <button class="btn btn-primary" onclick="saveTransfer()">Сохранить изменения</button>
    </div></div>

    <div id="itemModal" class="modal"><div class="modal-content" id="itemModalContent"></div></div>

    <div id="scannerModal" class="modal"><div class="modal-content">
        <button class="close-btn" onclick="closeScanner()">&times;</button>
        <div id="reader"></div>
    </div></div>

    <script>
        const OWNER_LOGIN = "Sam", OWNER_PASS = "oko2024";
        const firebaseConfig = {
            apiKey: "AIzaSyAk1A8PBDpSQjjiFoKyprSvzK4jO9Us_34",
            authDomain: "inventory-oko.firebaseapp.com",
            databaseURL: "https://inventory-oko-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "inventory-oko",
            storageBucket: "inventory-oko.firebasestorage.app",
            messagingSenderId: "528327448142",
            appId: "1:528327448142:web:c0bde5327bd1464c81951f"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database(), storage = firebase.storage();
        let items = [];
        let customSubCategories = [];

        function checkAccess() {
            if (document.getElementById('user-login').value === OWNER_LOGIN && document.getElementById('user-pass').value === OWNER_PASS) {
                localStorage.setItem('oko_auth', 'true'); showApp();
            } else alert("Ошибка доступа");
        }
        function logout() { localStorage.removeItem('oko_auth'); location.reload(); }
        if (localStorage.getItem('oko_auth') === 'true') showApp();

        function showApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            
            db.ref('inventory').on('value', snap => {
                items = snap.val() ? Object.values(snap.val()) : [];
                renderItems(); updateStats();
                const urlId = new URLSearchParams(window.location.search).get('id');
                if (urlId) { window.history.replaceState({}, '', window.location.origin + window.location.pathname); showItemDetails(urlId); }
            });

            db.ref('settings/subCategories').on('value', snap => {
                customSubCategories = snap.val() ? Object.values(snap.val()) : [];
                updateSubCategoryDropdowns();
            });
        }

        function updateSubCategoryDropdowns() {
            ['addSubCatSelect', 'editSubCatSelect'].forEach(id => {
                const select = document.getElementById(id);
                if(!select) return;
                select.innerHTML = '<option value="">-- Без подгруппы --</option>';
                customSubCategories.forEach(cat => {
                    const opt = document.createElement('option');
                    opt.value = cat; opt.innerText = cat;
                    select.appendChild(opt);
                });
                const newOpt = document.createElement('option');
                newOpt.value = "CREATE_NEW"; newOpt.innerText = "+ СОЗДАТЬ НОВУЮ";
                newOpt.style.color = "blue"; select.appendChild(newOpt);
            });
        }

        function checkNewSub(type) {
            const select = document.getElementById(type + 'SubCatSelect');
            const input = document.getElementById(type + 'CustomSub');
            input.style.display = (select.value === "CREATE_NEW") ? "block" : "none";
        }

        function filterByLoc(locName) {
            const input = document.getElementById('searchInput');
            if (input.value === locName) { input.value = ''; } 
            else { input.value = locName; }
            renderItems();
        }

        function openAddModal() { 
            document.getElementById('addId').value = 'OKO-'+Math.floor(1000+Math.random()*9000); 
            document.getElementById('addModal').classList.add('active'); 
        }

        async function saveNewItem() {
            const id = document.getElementById('addId').value, name = document.getElementById('addName').value.trim(), loc = document.getElementById('addLoc').value;
            let sub = document.getElementById('addSubCatSelect').value;
            const customSub = document.getElementById('addCustomSub').value.trim();
            const file = document.getElementById('addPhoto').files[0];

            if (!name) return alert("Введите имя!");
            if (sub === "CREATE_NEW") {
                if (!customSub) return alert("Введите название подгруппы!");
                sub = customSub; db.ref('settings/subCategories').push(sub);
            }

            document.getElementById('loader').style.display = 'flex';
            let url = "";
            if (file) { try { const snap = await storage.ref(`photos/${id}`).put(file); url = await snap.ref.getDownloadURL(); } catch (e) {} }
            
            db.ref('inventory/' + id).set({ 
                id, name, loc, sub: sub || "Прочее", photo: url, status: 'ok', 
                addedDate: new Date().toLocaleDateString('ru-RU'), lastCheck: 'Нет' 
            })
            .then(() => { document.getElementById('loader').style.display = 'none'; closeModal('addModal'); });
        }

        function renderItems() {
            const container = document.getElementById('itemsContainer'), search = document.getElementById('searchInput').value.toLowerCase();
            container.innerHTML = '';
            items.filter(i => i.name.toLowerCase().includes(search) || i.id.toLowerCase().includes(search) || i.loc.toLowerCase().includes(search)).forEach(item => {
                const div = document.createElement('div'); div.className = 'item-card';
                div.onclick = () => showItemDetails(item.id);
                const subText = (item.sub && item.sub !== "undefined" && item.sub !== "Прочее") ? `(${item.sub})` : "";
                const statusLabel = item.status === 'repair' ? '<div class="status-badge status-repair">РЕМОНТ</div>' : '';

                div.innerHTML = `
                    ${statusLabel}
                    <img src="${item.photo || 'https://via.placeholder.com/400x200?text=OKO'}" class="item-image">
                    <div class="item-content">
                        <div style="font-weight:bold; font-size: 1.1rem;">${item.name}</div>
                        <div style="font-size:0.8rem; margin: 5px 0;">ID: ${item.id} | 📍 ${item.loc} ${subText}</div>
                        <div class="qr-wrapper"><div id="qr-${item.id}" class="qr-box"></div></div>
                    </div>`;
                container.appendChild(div);
                new QRCode(document.getElementById(`qr-${item.id}`), { 
                    text: window.location.origin + window.location.pathname + "?id=" + item.id, 
                    width: 70, height: 70, correctLevel: QRCode.CorrectLevel.H 
                });
            });
        }

        function showItemDetails(id) {
            const item = items.find(i => i.id === id); if (!item) return;
            const content = document.getElementById('itemModalContent');
            const subText = (item.sub && item.sub !== "undefined") ? `(${item.sub})` : "";
            
            const statusBtn = item.status === 'repair' ? 
                `<button class="btn btn-success" onclick="upStat('${item.id}', 'ok')">✅ ВЕРНУТЬ В СТРОЙ (ОК)</button>` : 
                `<button class="btn btn-danger" onclick="upStat('${item.id}', 'repair')">🔧 В РЕМОНТ</button>`;

            content.innerHTML = `
                <button class="close-btn" onclick="closeModal('itemModal')">&times;</button>
                <img src="${item.photo || ''}" class="detail-photo">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h2 style="color:var(--oko-green)">${item.name}</h2>
                    <button onclick="editName('${item.id}', '${item.name}')" style="background:none; border:none; font-size:1.2rem;">✏️</button>
                </div>
                <div style="padding:15px; border:1px solid #ddd; margin:10px 0; background:#fff; border-radius:4px;">
                    <b>Статус:</b> <span style="color:${item.status==='repair'?'red':'green'}">${item.status==='repair'?'В РЕМОНТЕ':'ИСПРАВЕН'}</span><br>
                    <b>Локация:</b> ${item.loc} ${subText}<br>
                    <b>Проверка:</b> ${item.lastCheck}
                </div>
                <button class="btn btn-primary" onclick="markInv('${item.id}')">ИНВЕНТАРИЗАЦИЯ ПРОЙДЕНА</button>
                <button class="btn" onclick="openTransfer('${item.id}')">📦 ПЕРЕМЕСТИТЬ / ПОДГРУППА</button>
                ${statusBtn}
                <button class="btn" onclick="printItemQR('${item.id}')">Печать QR</button>
                <button class="btn btn-danger" onclick="delItem('${item.id}')">Удалить</button>`;
            document.getElementById('itemModal').classList.add('active');
        }

        function upStat(id, s) { 
            db.ref('inventory/'+id).update({status: s}); 
            setTimeout(() => showItemDetails(id), 300); 
        }

        function openTransfer(id) {
            const item = items.find(i => i.id === id);
            document.getElementById('editItemId').value = id;
            document.getElementById('editLoc').value = item.loc;
            document.getElementById('transferModal').classList.add('active');
        }

        function saveTransfer() {
            const id = document.getElementById('editItemId').value, loc = document.getElementById('editLoc').value;
            let sub = document.getElementById('editSubCatSelect').value;
            const customSub = document.getElementById('editCustomSub').value.trim();

            if (sub === "CREATE_NEW") {
                if (!customSub) return alert("Введите название!");
                sub = customSub; db.ref('settings/subCategories').push(sub);
            }

            db.ref('inventory/' + id).update({ loc: loc, sub: sub || "Прочее" });
            closeModal('transferModal'); setTimeout(() => showItemDetails(id), 400);
        }

        function editName(id, old) {
            const n = prompt("Новое название:", old);
            if (n) { db.ref('inventory/'+id).update({name: n.trim()}); setTimeout(() => showItemDetails(id), 300); }
        }

        function markInv(id) { 
            db.ref('inventory/'+id).update({lastCheck: new Date().toLocaleDateString('ru-RU')}); 
            closeModal('itemModal'); 
        }

        async function delItem(id) { 
            if(confirm("Удалить объект?")) { 
                try { await storage.ref(`photos/${id}`).delete(); } catch(e) {} 
                db.ref('inventory/'+id).remove(); closeModal('itemModal'); 
            } 
        }

        function openScanner() {
            document.getElementById('scannerModal').classList.add('active');
            const html5 = new Html5Qrcode("reader");
            html5.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, text => {
                const id = text.includes('?id=') ? text.split('?id=')[1] : text;
                html5.stop().then(() => { closeModal('scannerModal'); showItemDetails(id); });
            });
        }
        
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function closeScanner() { closeModal('scannerModal'); }

        function updateStats() {
            const today = new Date().toLocaleDateString('ru-RU');
            document.getElementById('totalItems').innerText = items.length;
            document.getElementById('okItems').innerText = items.filter(i => i.status === 'ok').length;
            document.getElementById('repairItems').innerText = items.filter(i => i.status === 'repair').length;
            document.getElementById('checkToday').innerText = items.filter(i => i.lastCheck === today).length;
            
            // Локации
            document.getElementById('locHall').innerText = items.filter(i => i.loc === 'Зал').length;
            document.getElementById('locKitchen').innerText = items.filter(i => i.loc === 'Кухня').length;
            document.getElementById('locBar').innerText = items.filter(i => i.loc === 'Бар').length;
            document.getElementById('locWh').innerText = items.filter(i => i.loc === 'Склад').length;
        }

        function printItemQR(id) {
            const it = items.find(i => i.id === id), qrUrl = window.location.origin + window.location.pathname + "?id=" + id;
            const win = window.open('', '_blank');
            win.document.write(`<html><body style="text-align:center; padding:30px;"><h2 style="font-family:serif;">${it.name}</h2><div id="q" style="display:inline-block;"></div><p>${it.id}</p><script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script><script>new QRCode(document.getElementById('q'), {text:"${qrUrl}", width:150, height:150}); setTimeout(()=>window.print(), 600);<\/script></body></html>`);
            win.document.close();
        }

        function exportToExcel() {
            const data = items.map(i => ({ID: i.id, Имя: i.name, Локация: i.loc, Подгруппа: i.sub, Статус: i.status, Проверка: i.lastCheck}));
            const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Inventory"); XLSX.writeFile(wb, "OKO_Inventory.xlsx");
        }
    </script>
</body>
</html>
