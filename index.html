<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Инвентарь ОКО Cloud</title>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --oko-green: #5C6041;
            --oko-beige: #D9D1B5;
            --oko-brown: #3B352A;
            --oko-white: #F4EEDC;
            --oko-red: #cc0000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Times New Roman", Times, serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--oko-white); color: var(--oko-brown); min-height: 100vh; padding-bottom: 80px; }

        .container { max-width: 700px; margin: 0 auto; padding: 10px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid var(--oko-beige); margin-bottom: 15px; }
        header h1 { font-size: 1.4rem; font-weight: bold; color: var(--oko-green); text-transform: uppercase; }

        .sync-status { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; font-weight: bold; padding: 6px 14px; border-radius: 25px; }
        .sync-online { background-color: #d4edda; color: #155724; }
        .sync-offline { background-color: #f8d7da; color: #721c24; }

        .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 10px; }
        .stat-card { background: var(--oko-beige); padding: 8px 2px; border-radius: 4px; text-align: center; border: 1px solid rgba(0,0,0,0.05); }
        .stat-number { font-size: 1.1rem; font-weight: bold; color: var(--oko-green); }
        .stat-label { font-size: 0.65rem; text-transform: uppercase; }

        .loc-stats .stat-card { cursor: pointer; background: #E5E0CD; }

        .search-box { width: 100%; padding: 12px; border: 1px solid var(--oko-beige); margin-bottom: 15px; outline: none; font-size: 1rem; background: white; }

        .item-card { background: white; border-radius: 4px; overflow: hidden; margin-bottom: 12px; border: 1px solid var(--oko-beige); cursor: pointer; position: relative; }
        .item-image { width: 100%; height: 180px; object-fit: cover; background: #eee; }
        .item-content { padding: 12px; }
        .status-badge { position: absolute; top: 10px; right: 10px; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; z-index: 5; background: #ffebee; color: #c62828; border: 1px solid #c62828; }

        .qr-wrapper { background: white; padding: 5px; display: inline-block; border: 1px solid #ddd; margin-top: 5px; }

        .btn { padding: 12px; border: 1px solid var(--oko-brown); border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 8px; text-transform: uppercase; background: white; font-size: 0.9rem; }
        .btn-primary { background: var(--oko-green); color: white; border: none; }
        .btn-danger { color: var(--oko-red); border-color: var(--oko-red); }
        .btn-success { color: #2e7d32; border-color: #2e7d32; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; overflow-y: auto; }
        .modal.active { display: block; }
        /* Модалка редактирования поверх основной */
        #editModal { z-index: 3000; } 
        
        .modal-content { background: var(--oko-white); width: 100%; min-height: 100vh; padding: 20px; position: relative; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 2.5rem; border: none; background: none; cursor: pointer; color: var(--oko-brown); z-index: 10; }

        .detail-photo { width: 100%; max-height: 220px; object-fit: contain; background: #000; border-radius: 4px; margin-bottom: 15px; }

        .fab { position: fixed; bottom: 20px; right: 20px; width: 55px; height: 55px; background: var(--oko-green); color: white; border-radius: 50%; border: none; font-size: 1.8rem; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 1000; }
        .fab-menu { position: fixed; bottom: 85px; right: 20px; display: none; flex-direction: column; gap: 10px; z-index: 1000; }
        .fab-menu.active { display: flex; }
        .fab-item { background: white; padding: 10px 15px; border-radius: 4px; font-weight: bold; border: 1px solid var(--oko-beige); font-size: 0.8rem; text-transform: uppercase; }

        .loader-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
    </style>
</head>
<body>

    <div id="loader" class="loader-overlay"><h2>ОБРАБОТКА...</h2></div>

    <div class="container">
        <header>
            <h1>📦 Инвентарь ОКО</h1>
            <div id="syncStatus" class="sync-status sync-offline">
                <span id="syncIcon">⚠️</span> <span id="syncText">Офлайн</span>
            </div>
        </header>

        <div class="stats-bar">
            <div class="stat-card"><div class="stat-number" id="totalItems">0</div><div class="stat-label">ВСЕГО</div></div>
            <div class="stat-card"><div class="stat-number" id="okItems">0</div><div class="stat-label">ОК</div></div>
            <div class="stat-card"><div class="stat-number" id="repairItems">0</div><div class="stat-label">РЕМОНТ</div></div>
            <div class="stat-card"><div class="stat-number" id="checkToday">0</div><div class="stat-label">СЕГОДНЯ</div></div>
        </div>

        <div class="stats-bar loc-stats">
            <div class="stat-card" onclick="filterByLoc('Зал')"><div class="stat-number" id="locHall">0</div><div class="stat-label">ЗАЛ</div></div>
            <div class="stat-card" onclick="filterByLoc('Кухня')"><div class="stat-number" id="locKitchen">0</div><div class="stat-label">КУХНЯ</div></div>
            <div class="stat-card" onclick="filterByLoc('Бар')"><div class="stat-number" id="locBar">0</div><div class="stat-label">БАР</div></div>
            <div class="stat-card" onclick="filterByLoc('Склад')"><div class="stat-number" id="locWh">0</div><div class="stat-label">СКЛАД</div></div>
        </div>

        <input type="text" class="search-box" id="searchInput" placeholder="Поиск (название, ID, группа)..." onkeyup="renderItems()">
        <div id="itemsContainer"></div>
    </div>

    <button class="fab" onclick="document.getElementById('fabMenu').classList.toggle('active')">+</button>
    <div class="fab-menu" id="fabMenu">
        <button class="fab-item" onclick="openAddModal()">Добавить</button>
        <button class="fab-item" onclick="openScanner()">Сканер</button>
        <button class="fab-item" onclick="exportToExcel()">Excel</button>
    </div>

    <!-- Модалка добавления -->
    <div id="addModal" class="modal"><div class="modal-content">
        <button class="close-btn" onclick="closeModal('addModal')">&times;</button>
        <h2 style="color:var(--oko-green)">НОВЫЙ ОБЪЕКТ</h2><br>
        <input type="text" id="addId" class="search-box" readonly>
        <input type="text" id="itemName" class="search-box" placeholder="Название">
        <label>Локация:</label>
        <select id="itemLocation" class="search-box">
            <option value="Зал">Зал</option>
            <option value="Кухня">Кухня</option>
            <option value="Бар">Бар</option>
            <option value="Склад">Склад</option>
            <option value="Офис">Офис</option>
        </select>
        <label>Подгруппа:</label>
        <select id="addSubCatSelect" class="search-box" onchange="checkNewSub('add')"></select>
        <input type="text" id="addCustomSub" class="search-box" style="display:none; border:2px solid var(--oko-green);" placeholder="Новая подгруппа">
        <label>Фотография:</label>
        <input type="file" id="itemPhoto" class="search-box" accept="image/*">
        <button class="btn btn-primary" onclick="saveNewItem()">Сохранить в облако</button>
    </div></div>

    <!-- Модалка редактирования / перемещения -->
    <div id="editModal" class="modal"><div class="modal-content">
        <button class="close-btn" onclick="closeModal('editModal')">&times;</button>
        <h2 style="color:var(--oko-green)">ИЗМЕНИТЬ ДАННЫЕ</h2><br>
        <input type="hidden" id="editItemTargetId">
        
        <label>Название объекта:</label>
        <input type="text" id="editItemName" class="search-box">

        <label>Новая локация:</label>
        <select id="editItemLocation" class="search-box">
            <option value="Зал">Зал</option>
            <option value="Кухня">Кухня</option>
            <option value="Бар">Бар</option>
            <option value="Склад">Склад</option>
            <option value="Офис">Офис</option>
        </select>

        <label>Подгруппа:</label>
        <select id="editSubCatSelect" class="search-box" onchange="checkNewSub('edit')"></select>
        <input type="text" id="editCustomSub" class="search-box" style="display:none; border:2px solid var(--oko-green);" placeholder="Назовите новую группу">

        <label>Заменить фотографию (файл):</label>
        <input type="file" id="editItemPhoto" class="search-box" accept="image/*">

        <button class="btn btn-primary" onclick="saveEditChanges()">Применить изменения</button>
    </div></div>

    <div id="itemModal" class="modal"><div class="modal-content" id="itemModalContent"></div></div>

    <div id="scannerModal" class="modal"><div class="modal-content">
        <button class="close-btn" onclick="closeScanner()">&times;</button>
        <div id="reader"></div>
    </div></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAk1A8PBDpSQjjiFoKyprSvzK4jO9Us_34",
            authDomain: "inventory-oko.firebaseapp.com",
            databaseURL: "https://inventory-oko-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "inventory-oko",
            storageBucket: "inventory-oko.firebasestorage.app",
            messagingSenderId: "528327448142",
            appId: "1:528327448142:web:c0bde5327bd1464c81951f"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let items = [], subCategories = [], html5QrCode = null;
        const DEFAULT_PHOTO = 'https://via.placeholder.com/400x200?text=OKO';

        document.addEventListener('DOMContentLoaded', () => {
            db.ref('inventory').on('value', snap => {
                items = snap.val() ? Object.values(snap.val()) : [];
                renderItems(); updateStats();
            });
            db.ref('settings/subCategories').on('value', snap => {
                subCategories = snap.val() ? Object.values(snap.val()) : [];
                updateDropdowns();
            });
            db.ref('.info/connected').on('value', snap => {
                const statusDiv = document.getElementById('syncStatus'), icon = document.getElementById('syncIcon'), text = document.getElementById('syncText');
                if (snap.val()) { statusDiv.className = 'sync-status sync-online'; icon.innerText = '🟢'; text.innerText = 'Онлайн'; } 
                else { statusDiv.className = 'sync-status sync-offline'; icon.innerText = '⚠️'; text.innerText = 'Офлайн'; }
            });
        });

        function updateDropdowns() {
            ['addSubCatSelect', 'editSubCatSelect'].forEach(id => {
                const sel = document.getElementById(id);
                sel.innerHTML = '<option value="">-- Без подгруппы --</option>';
                subCategories.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
                sel.innerHTML += '<option value="NEW" style="color:blue;">+ НОВАЯ ГРУППА</option>';
            });
        }

        function checkNewSub(type) {
            const val = document.getElementById(type === 'add' ? 'addSubCatSelect' : 'editSubCatSelect').value;
            document.getElementById(type === 'add' ? 'addCustomSub' : 'editCustomSub').style.display = (val === 'NEW') ? 'block' : 'none';
        }

        function filterByLoc(loc) {
            const inp = document.getElementById('searchInput');
            inp.value = (inp.value === loc) ? '' : loc; renderItems();
        }

        function openAddModal() {
            document.getElementById('addId').value = 'OKO-' + Math.floor(1000 + Math.random() * 9000);
            document.getElementById('fabMenu').classList.remove('active');
            document.getElementById('addModal').classList.add('active');
        }

        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        async function saveNewItem() {
            const id = document.getElementById('addId').value, name = document.getElementById('itemName').value.trim();
            const loc = document.getElementById('itemLocation').value;
            let sub = document.getElementById('addSubCatSelect').value;
            const custom = document.getElementById('addCustomSub').value.trim();
            const file = document.getElementById('itemPhoto').files[0];

            if (!name) return alert("Введите имя!");
            if (sub === 'NEW') { if (!custom) return alert("Имя группы!"); sub = custom; db.ref('settings/subCategories').push(sub); }

            document.getElementById('loader').style.display = 'flex';
            try {
                let photo = DEFAULT_PHOTO;
                if (file) photo = await new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(file); });
                await db.ref('inventory/' + id).set({ id, name, location: loc, sub: sub || "Прочее", photo, status: 'ok', lastCheck: 'Нет', addedDate: new Date().toLocaleDateString('ru-RU') });
                document.getElementById('loader').style.display = 'none'; closeModal('addModal');
                document.getElementById('itemName').value = ""; document.getElementById('itemPhoto').value = "";
            } catch (e) { document.getElementById('loader').style.display = 'none'; alert(e.message); }
        }

        function renderItems() {
            const container = document.getElementById('itemsContainer'), search = document.getElementById('searchInput').value.toLowerCase();
            container.innerHTML = '';
            items.filter(i => i.name.toLowerCase().includes(search) || i.id.toLowerCase().includes(search) || i.location.toLowerCase().includes(search) || (i.sub && i.sub.toLowerCase().includes(search))).forEach(item => {
                const div = document.createElement('div'); div.className = 'item-card';
                div.onclick = () => showItemDetail(item.id);
                const subPart = (item.sub && item.sub !== "Прочее") ? ` | 📂 ${item.sub}` : "";
                const status = item.status === 'repair' ? '<div class="status-badge">РЕМОНТ</div>' : '';
                div.innerHTML = `${status}<img src="${item.photo || DEFAULT_PHOTO}" class="item-image"><div class="item-content"><strong style="font-size:1.1rem;">${item.name}</strong><br><span style="font-size:0.85rem; color:#666;">ID: ${item.id} | 📍 ${item.location}${subPart}</span><br><div class="qr-wrapper"><div id="qr-${item.id}"></div></div></div>`;
                container.appendChild(div);
                new QRCode(document.getElementById(`qr-${item.id}`), { text: window.location.origin + window.location.pathname + "?id=" + item.id, width: 70, height: 70 });
            });
        }

        function showItemDetail(id) {
            const item = items.find(i => i.id === id); if (!item) return;
            const statusBtn = item.status === 'repair' ? `<button class="btn btn-success" onclick="upStat('${item.id}', 'ok')">✅ ВЕРНУТЬ В СТРОЙ</button>` : `<button class="btn btn-danger" onclick="upStat('${item.id}', 'repair')">🔧 В РЕМОНТ</button>`;
            document.getElementById('itemModalContent').innerHTML = `
                <button class="close-btn" onclick="closeModal('itemModal')">&times;</button>
                <img src="${item.photo}" class="detail-photo">
                <h2 style="color:var(--oko-green)">${item.name}</h2>
                <div style="background:white; padding:15px; border-radius:4px; margin:10px 0; border:1px solid #ddd;">
                    <p><strong>ID:</strong> ${item.id}</p>
                    <p><strong>Локация:</strong> ${item.location}</p>
                    <p><strong>Группа:</strong> ${item.sub}</p>
                    <p><strong>Проверка:</strong> ${item.lastCheck}</p>
                    <p><strong>Статус:</strong> ${item.status === 'repair' ? 'РЕМОНТ' : 'ОК'}</p>
                </div>
                <button class="btn btn-primary" onclick="markCheck('${item.id}')">ИНВЕНТАРИЗАЦИЯ ПРОЙДЕНА</button>
                <button class="btn" onclick="openEditModal('${item.id}')">📦 ПЕРЕМЕСТИТЬ / ИЗМЕНИТЬ</button>
                ${statusBtn}
                <button class="btn" onclick="printQR('${item.id}')">Печать QR</button>
                <button class="btn btn-danger" onclick="deleteItem('${item.id}')">Удалить объект</button>`;
            document.getElementById('itemModal').classList.add('active');
        }

        // ОТКРЫТИЕ ОКНА РЕДАКТИРОВАНИЯ
        function openEditModal(id) {
            const item = items.find(i => i.id === id);
            document.getElementById('editItemTargetId').value = id;
            document.getElementById('editItemName').value = item.name;
            document.getElementById('editItemLocation').value = item.location;
            document.getElementById('editSubCatSelect').value = subCategories.includes(item.sub) ? item.sub : "";
            document.getElementById('editModal').classList.add('active');
        }

        // СОХРАНЕНИЕ ИЗМЕНЕНИЙ (Перемещение, Группа, Имя, Файл)
        async function saveEditChanges() {
            const id = document.getElementById('editItemTargetId').value;
            const newName = document.getElementById('editItemName').value.trim();
            const newLoc = document.getElementById('editItemLocation').value;
            let newSub = document.getElementById('editSubCatSelect').value;
            const customSub = document.getElementById('editCustomSub').value.trim();
            const newFile = document.getElementById('editItemPhoto').files[0];

            if (!newName) return alert("Имя не может быть пустым");
            if (newSub === 'NEW') { if (!customSub) return alert("Имя группы!"); newSub = customSub; db.ref('settings/subCategories').push(newSub); }

            document.getElementById('loader').style.display = 'flex';
            try {
                let updateData = { name: newName, location: newLoc, sub: newSub || "Прочее" };
                
                // Если выбран новый файл, конвертируем и добавляем в обновление
                if (newFile) {
                    const photoBase64 = await new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(newFile); });
                    updateData.photo = photoBase64;
                }

                await db.ref('inventory/' + id).update(updateData);
                document.getElementById('loader').style.display = 'none';
                closeModal('editModal');
                setTimeout(() => showItemDetail(id), 300); // Обновляем карточку деталей
            } catch (e) { document.getElementById('loader').style.display = 'none'; alert(e.message); }
        }

        function upStat(id, s) { db.ref('inventory/' + id).update({ status: s }); setTimeout(() => showItemDetail(id), 300); }
        function markCheck(id) { db.ref('inventory/' + id).update({ lastCheck: new Date().toLocaleDateString('ru-RU') }); closeModal('itemModal'); }
        async function deleteItem(id) { if (confirm("Удалить?")) { await db.ref('inventory/' + id).remove(); closeModal('itemModal'); } }

        function updateStats() {
            const today = new Date().toLocaleDateString('ru-RU');
            document.getElementById('totalItems').innerText = items.length;
            document.getElementById('okItems').innerText = items.filter(i => i.status === 'ok').length;
            document.getElementById('repairItems').innerText = items.filter(i => i.status === 'repair').length;
            document.getElementById('checkToday').innerText = items.filter(i => i.lastCheck === today).length;
            document.getElementById('locHall').innerText = items.filter(i => i.location === 'Зал').length;
            document.getElementById('locKitchen').innerText = items.filter(i => i.location === 'Кухня').length;
            document.getElementById('locBar').innerText = items.filter(i => i.location === 'Бар').length;
            document.getElementById('locWh').innerText = items.filter(i => i.location === 'Склад').length;
        }

        function openScanner() {
            document.getElementById('scannerModal').classList.add('active');
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, text => {
                const id = text.includes('?id=') ? text.split('?id=')[1] : text;
                closeScanner(); showItemDetail(id);
            });
        }
        function closeScanner() { if (html5QrCode) html5QrCode.stop(); closeModal('scannerModal'); }

        function printQR(id) {
            const item = items.find(i => i.id === id);
            const win = window.open('', '_blank');
            win.document.write(`<html><body style="text-align:center; padding:30px;"><h2>${item.name}</h2><div id="q" style="display:inline-block;"></div><script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script><script>new QRCode(document.getElementById('q'), {text: "${window.location.origin + window.location.pathname + "?id=" + id}", width: 150, height: 150}); setTimeout(() => window.print(), 500);<\/script></body></html>`);
            win.document.close();
        }

        function exportToExcel() {
            const data = items.map(i => ({ ID: i.id, Имя: i.name, Локация: i.location, Группа: i.sub, Статус: i.status }));
            const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Inventory"); XLSX.writeFile(wb, "OKO_Cloud.xlsx");
        }
    </script>
</body>
</html>
